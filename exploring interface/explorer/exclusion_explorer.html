roup_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Civic obligations"}, {"work_name": "Politics", "author": "Aristotle", "impact_year": "-348", "polity": "Thebans", "criterion_category": "AGE", "criterion_label": "Children's incomplete citizenship until adulthood", "in_group": "Adult citizens", "out_group": "Children of citizens", "resource": "Full citizenship rights", "speaker": "author", "verbatim": "For it is true that not all the persons indispensable for the existence of a state are to be deemed citizens, since even the sons of citizens are not citizens in the same sense as the adults: the latter are citizens in the full sense, the former only by presumption—they are citizens, but incomplete ones.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0086/tlg035/tlg0086.tlg035.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 9 pages from original 243 pages)", "matched_keywords": "adult, adults, citizen, citizens, citizenship, estate, farmer, shame, son, statute", "extraction_cost_usd": "0.20895", "prompt_tokens": "7625", "completion_tokens": "1261", "in_group_std": "Adults", "out_group_std": "Young/Minors", "resource_std": "Citizenship"}, {"work_name": "Fragments", "author": "Epictetus", "impact_year": "85", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Free persons have liberty while slaves lack freedom", "in_group": "Free persons", "out_group": "Slaves", "resource": "Personal freedom and legal autonomy", "speaker": "author", "verbatim": "For no one is a slave whose will is free. Fortune is an evil chain to the body, and vice to the soul. For he whose body is unbound, and whose soul is chained, is a slave. On the contrary, he whose body is chained, and his soul unbound, is free.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0557/tlg003a/tlg0557.tlg003a.perseus-eng4.txt", "extraction_method": "HYBRID_EXTRACTED (15 passages, 8 pages from original 14 pages)", "matched_keywords": "boy, fortune, free, freed, slave, slavery, slaves, vice", "extraction_cost_usd": "0.150195", "prompt_tokens": "8118", "completion_tokens": "379", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Freedom"}, {"work_name": "Fragments", "author": "Epictetus", "impact_year": "85", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Free persons should not be served by slaves", "in_group": "Free persons", "out_group": "Slaves", "resource": "Freedom from slavery", "speaker": "author", "verbatim": "What you avoid suffering yourself, seek not to impose on others. You avoid slavery, for instance; take care not to enslave. For if you can bear to exact slavery from others, you appear to have been yourself a slave. For vice has nothing in common with virtue, nor freedom with slavery. As a person in health would not wish to be attended by the sick, nor to have those who live with him in a state of sickness; so neither would a person who is free bear to be served by slaves, nor to have those who live with him in a state of slavery.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0557/tlg003a/tlg0557.tlg003a.perseus-eng4.txt", "extraction_method": "HYBRID_EXTRACTED (15 passages, 8 pages from original 14 pages)", "matched_keywords": "bar, common, commoner, enslaved, estate, free, freed, freedman, freedmen, freedom, mother, slave, slavery, slaves, statute, vice, wealth", "extraction_cost_usd": "0.150195", "prompt_tokens": "8118", "completion_tokens": "379", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Freedom"}, {"work_name": "Shield of Heracles", "author": "Hesiod", "impact_year": "-740", "polity": "Greek City-States", "criterion_category": "GENDER", "criterion_label": "Women excluded from public decision-making", "in_group": "Men", "out_group": "Women", "resource": "Decision-making power in public affairs", "speaker": "narrator", "verbatim": "It is for the man to take care of business outside the house; let no woman make decrees in those matters", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0020/tlg003/tlg0020.tlg003.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (13 passages, 8 pages from original 11 pages)", "matched_keywords": "decree, man, masters, woman, women", "extraction_cost_usd": "0.125745", "prompt_tokens": "7733", "completion_tokens": "130", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Political participation"}, {"work_name": "The Discourses of Epictetus", "author": "Epictetus", "impact_year": "85", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Slaves excluded from freedom and self-determination", "in_group": "Free persons", "out_group": "Slaves", "resource": "Personal freedom and legal autonomy", "speaker": "Epictetus", "verbatim": "But I have purchased them, and they have not purchased me. Do you see in what direction this tends? that you are a slave to those who have purchased you, for no man can be a slave to those whom he has purchased.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0557/tlg001/tlg0557.tlg001.perseus-eng3.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 9 pages from original 331 pages)", "matched_keywords": "man, slave, slavery, slaves", "extraction_cost_usd": "0.157395", "prompt_tokens": "8258", "completion_tokens": "447", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Freedom"}, {"work_name": "The Discourses of Epictetus", "author": "Epictetus", "impact_year": "85", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "GENDER", "criterion_label": "Women excluded from philosophical education", "in_group": "Men", "out_group": "Women", "resource": "Access to philosophical education and discourse", "speaker": "Epictetus", "verbatim": "Come take a young man, bring him up according to your doctrines. The doctrines are bad, subversive of a state, pernicious to families, and not becoming to women. Dismiss them, man.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0557/tlg001/tlg0557.tlg001.perseus-eng3.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 9 pages from original 331 pages)", "matched_keywords": "estate, family, man, statute, woman, women, young, younger", "extraction_cost_usd": "0.157395", "prompt_tokens": "8258", "completion_tokens": "447", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Cultural participation"}, {"work_name": "The Discourses of Epictetus", "author": "Epictetus", "impact_year": "85", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Masters have power over slaves' bodies and circumstances", "in_group": "Masters", "out_group": "Slaves", "resource": "Control over one's own body and circumstances", "speaker": "Epictetus", "verbatim": "Therefore it must of necessity be that those who have the power over any of these circumstances must be our masters. For consider: who is the master of a slave? It is not his master? but it is the circumstance which has the power of procuring or not procuring for him what he desires.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0557/tlg001/tlg0557.tlg001.perseus-eng3.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 9 pages from original 331 pages)", "matched_keywords": "govern, master, masters, owner, power, slave, slavery, slaves", "extraction_cost_usd": "0.157395", "prompt_tokens": "8258", "completion_tokens": "447", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Freedom"}, {"work_name": "The Shepherd of Hermas", "author": "Hermas", "impact_year": "150", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "PROPERTY_WEALTH", "criterion_label": "Wealthy citizens obligated to share resources with the poor", "in_group": "The wealthy", "out_group": "The poor", "resource": "Wealth and material necessities", "speaker": "narrator", "verbatim": "So also the poor; interceding with the Lord for the rich; complement their wealth; and again; the rich helping the poor with their necessities complement their prayers. Both; therefore; share in the righteous work. Therefore he who does these things shall not be deserted by God; but shall be inscribed in the books of the living.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg1419/tlg001/tlg1419.tlg001.perseus-eng1.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 8 pages from original 82 pages)", "matched_keywords": "deserter, desertion, heir, poor, rich, rights, scribe, shame, wealth, wealthy, work", "extraction_cost_usd": "0.14565", "prompt_tokens": "7845", "completion_tokens": "373", "in_group_std": "Property owners", "out_group_std": "Poor/Non-property owners", "resource_std": "Property/Wealth"}, {"work_name": "The Shepherd of Hermas", "author": "Hermas", "impact_year": "150", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Slaves excluded from freedom until granted by master", "in_group": "Free persons", "out_group": "Slaves/servants", "resource": "Personal freedom", "speaker": "narrator", "verbatim": "And they congratulated the servant on the character which the master gave him. And he said to them: I promised this servant his freedom if he kept the orders which I gave him. Now he has kept my orders, and has added good work in the vineyard, and greatly pleased me. So in reward for this work which he has done I wish to make him joint heir with my son, because, when he had a good thought he did not put it on one side, but carried it out.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg1419/tlg001/tlg1419.tlg001.perseus-eng1.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 8 pages from original 82 pages)", "matched_keywords": "freed, freedman, freedmen, freedom, heir, master, masters, servant, servants, son, work", "extraction_cost_usd": "0.14565", "prompt_tokens": "7845", "completion_tokens": "373", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Freedom"}, {"work_name": "Epistles", "author": "Ignatius of Antioch", "impact_year": "70", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "MORAL_CONDUCT", "criterion_label": "Those who corrupt families excluded from kingdom of God", "in_group": "Those who maintain proper moral conduct", "out_group": "Those who corrupt families", "resource": "Inheritance of the kingdom of God", "speaker": "Ignatius", "verbatim": "Do not err, my brethren; they who corrupt families shall not inherit the kingdom of God. If then those who do this according to the flesh suffer death, how much more if a man corrupt by false teaching the faith of God for the sake of which Jesus Christ was crucified?", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg1443/tlg001/tlg1443.tlg001.perseus-eng1.txt", "extraction_method": "HYBRID_EXTRACTED (20 passages, 8 pages from original 27 pages)", "matched_keywords": "corrupt, corruption, family, inherit, inheritance, man", "extraction_cost_usd": "0.163275", "prompt_tokens": "7895", "completion_tokens": "598", "in_group_std": "Morally upright", "out_group_std": "Morally condemned", "resource_std": "Inheritance"}, {"work_name": "Epistles", "author": "Ignatius of Antioch", "impact_year": "70", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "MORAL_CONDUCT", "criterion_label": "Schismatics excluded from kingdom of God", "in_group": "Those who maintain unity with the Church", "out_group": "Those who follow makers of schism", "resource": "Inheritance of the kingdom of God", "speaker": "Ignatius", "verbatim": "For as many as belong to God and Jesus Christ,—these are with the bishop. And as many as repent and come to the unity of the Church,—these also shall be of God, to be living according to Jesus Christ. Be not deceived, my brethren, if any one follow a maker of schism, he does not inherit the kingdom of God; if any man walk in strange doctrine he has no part in the Passion.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg1443/tlg001/tlg1443.tlg001.perseus-eng1.txt", "extraction_method": "HYBRID_EXTRACTED (20 passages, 8 pages from original 27 pages)", "matched_keywords": "inherit, inheritance, man, stranger, strangers", "extraction_cost_usd": "0.163275", "prompt_tokens": "7895", "completion_tokens": "598", "in_group_std": "Morally upright", "out_group_std": "Morally condemned", "resource_std": "Inheritance"}, {"work_name": "Epistles", "author": "Ignatius of Antioch", "impact_year": "70", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "GENDER", "criterion_label": "Marriage consent authority reserved for men through bishop", "in_group": "Men (through the bishop)", "out_group": "Women", "resource": "Authority over marriage decisions", "speaker": "Ignatius", "verbatim": "Speak to my sisters that they love the Lord, and be content with their husbands in flesh and in spirit. In the same way enjoin on my brothers in the name of Jesus Christ to love their wives as the Lord loved the Church. If any man can remain in continence to the honour of the flesh of the Lord let him do so without boasting. If he boast he is lost, and if it be made known except to the bishop, he is polluted. But it is right for men and women who marry to be united with the consent of the bishop, that the marriage be according to the Lord and not according to lust.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg1443/tlg001/tlg1443.tlg001.perseus-eng1.txt", "extraction_method": "HYBRID_EXTRACTED (20 passages, 8 pages from original 27 pages)", "matched_keywords": "heir, husband, maiden, man, men, right, rights, shame, wives, woman, women", "extraction_cost_usd": "0.163275", "prompt_tokens": "7895", "completion_tokens": "598", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Political participation"}, {"work_name": "On The Estate of Ciron", "author": "Isaeus", "impact_year": "-384", "polity": "Peloponnesian League", "criterion_category": "GENDER", "criterion_label": "Women excluded from inheriting property directly when male relatives exist", "in_group": "Male descendants and relatives", "out_group": "Women", "resource": "Direct inheritance of property", "speaker": "author", "verbatim": "Supposing that my mother, Ciron's daughter, were still alive and that her father had died intestate and that my opponent were his brother and not his nephew, he would have the right to claim the daughter in marriage, but he could not claim the estate, which would go to the children born of their marriage when they had completed two years after puberty; for this is what the laws ordain.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0017/tlg008/tlg0017.tlg008.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (9 passages, 8 pages from original 11 pages)", "matched_keywords": "alien, born, children, daughter, denied, estate, father, heir, law, laws, mother, right, rights", "extraction_cost_usd": "0.149715", "prompt_tokens": "7386", "completion_tokens": "519", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Inheritance"}, {"work_name": "On The Estate of Ciron", "author": "Isaeus", "impact_year": "-384", "polity": "Peloponnesian League", "criterion_category": "CITIZENSHIP", "criterion_label": "Children of non-citizen mothers born after 403 BC denied citizenship", "in_group": "Children of citizen mothers", "out_group": "Children of non-citizen mothers", "resource": "Citizenship rights", "speaker": "author", "verbatim": "For if you are misled into the belief that our mother was not an Athenian citizen, neither are we citizens; for we were born after the archonship of Eucleides. The children of mothers who were not citizens, born after 403 B.C., did not enjoy civic rights.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0017/tlg008/tlg0017.tlg008.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (9 passages, 8 pages from original 11 pages)", "matched_keywords": "athenian, athenians, born, children, citizen, citizens, citizenship, mother, right, rights", "extraction_cost_usd": "0.149715", "prompt_tokens": "7386", "completion_tokens": "519", "in_group_std": "Citizens", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Citizenship"}, {"work_name": "On The Estate of Ciron", "author": "Isaeus", "impact_year": "-384", "polity": "Peloponnesian League", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Slaves can only give legal testimony under torture", "in_group": "Free persons", "out_group": "Slaves", "resource": "Right to give testimony freely in legal proceedings", "speaker": "author", "verbatim": "You Athenians hold the opinion that both in public and in private matters examination under torture is the most searching test; and so, when you have slaves and free men before you and it is necessary that some contested point should be cleared up, you do not employ the evidence of free men but seek to establish the truth about the facts by putting the slaves to torture.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0017/tlg008/tlg0017.tlg008.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (9 passages, 8 pages from original 11 pages)", "matched_keywords": "athenian, athenians, free, freed, masters, men, old, slave, slaves", "extraction_cost_usd": "0.149715", "prompt_tokens": "7386", "completion_tokens": "519", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Legal standing"}, {"work_name": "On the Estate of Menecles", "author": "Isaeus", "impact_year": "-384", "polity": "Peloponnesian League", "criterion_category": "GENDER", "criterion_label": "Only men can adopt sons and dispose of property", "in_group": "Men", "out_group": "Women", "resource": "Right to adopt children and dispose of property through wills", "speaker": "author", "verbatim": "The law thus allowing Menecles, because he was childless, to adopt a son, he adopted me, not by a will made at the point of death, as other citizens have done, nor during illness; but when he was sound in body and mind, and fully aware of what he was doing, he adopted me and introduced me to his fellow-wardsmen in the presence of my opponents and enrolled me among the demesmen and the members of his confraternity.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0017/tlg002/tlg0017.tlg002.perseus-eng2.txt", "extraction_method": "FULL_TEXT (21,706 chars ≈ 9 pages)", "matched_keywords": "allow, allowed, boy, citizen, citizens, citizenship, law, laws, maiden, mother, son", "extraction_cost_usd": "0.14961", "prompt_tokens": "7994", "completion_tokens": "396", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Inheritance"}, {"work_name": "On the Estate of Menecles", "author": "Isaeus", "impact_year": "-384", "polity": "Peloponnesian League", "criterion_category": "CITIZENSHIP", "criterion_label": "Only citizens can adopt sons and be adopted", "in_group": "Citizens", "out_group": "Non-citizens", "resource": "Right to adopt children and inherit property", "speaker": "author", "verbatim": "The law thus allowing Menecles, because he was childless, to adopt a son, he adopted me, not by a will made at the point of death, as other citizens have done, nor during illness; but when he was sound in body and mind, and fully aware of what he was doing, he adopted me and introduced me to his fellow-wardsmen in the presence of my opponents and enrolled me among the demesmen and the members of his confraternity.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0017/tlg002/tlg0017.tlg002.perseus-eng2.txt", "extraction_method": "FULL_TEXT (21,706 chars ≈ 9 pages)", "matched_keywords": "allow, allowed, boy, citizen, citizens, citizenship, law, laws, maiden, mother, son", "extraction_cost_usd": "0.14961", "prompt_tokens": "7994", "completion_tokens": "396", "in_group_std": "Citizens", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Inheritance"}, {"work_name": "Works and Days", "author": "Hesiod", "impact_year": "-740", "polity": "Greek City-States", "criterion_category": "GENDER", "criterion_label": "Women excluded from works of Aphrodite and public life", "in_group": "Men", "out_group": "Women (maidens)", "resource": "Freedom of movement and participation in public life", "speaker": "narrator", "verbatim": "And it does not blow through the tender maiden who stays indoors with her dear mother, unlearned as yet in the works of golden Aphrodite, and who washes her soft body and anoints herself with oil and lies down in an inner room within the house, on a winter's day when the Boneless One gnaws his foot in his fireless house and wretched home.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0020/tlg002/tlg0020.tlg002.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (20 passages, 8 pages from original 21 pages)", "matched_keywords": "aliens, boy, gender, maiden, mother, work", "extraction_cost_usd": "0.16845", "prompt_tokens": "7830", "completion_tokens": "680", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Freedom"}, {"work_name": "Works and Days", "author": "Hesiod", "impact_year": "-740", "polity": "Greek City-States", "criterion_category": "PROPERTY_WEALTH", "criterion_label": "Property owners have access to legal disputes over goods", "in_group": "Those with property and stored grain", "out_group": "Those without year's provisions", "resource": "Legal standing to raise disputes and access to courts", "speaker": "narrator", "verbatim": "Little concern has he with quarrels and courts who has not a year's victuals laid up betimes, even that which the earth bears, Demeter's grain. When you have got plenty of that, you can raise disputes and strive to get another's goods. But you shall have no second chance to deal so again: nay, let us settle our dispute here with true judgement which is of Zeus and is perfect.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0020/tlg002/tlg0020.tlg002.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (20 passages, 8 pages from original 21 pages)", "matched_keywords": "court, deserter, judgment", "extraction_cost_usd": "0.16845", "prompt_tokens": "7830", "completion_tokens": "680", "in_group_std": "Property owners", "out_group_std": "Poor/Non-property owners", "resource_std": "Legal standing"}, {"work_name": "Works and Days", "author": "Hesiod", "impact_year": "-740", "polity": "Greek City-States", "criterion_category": "BIRTH_LINEAGE", "criterion_label": "Single legitimate son inherits father's estate", "in_group": "Single legitimate sons", "out_group": "Multiple sons or illegitimate children", "resource": "Inheritance of family property and wealth", "speaker": "narrator", "verbatim": "There should be an only son to feed his father's house, for so wealth will increase in the home; but if you leave a second son you should die old. Yet Zeus can easily give great wealth to a greater number.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0020/tlg002/tlg0020.tlg002.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (20 passages, 8 pages from original 21 pages)", "matched_keywords": "father, freed, old, slave, son, wealth, wealthy", "extraction_cost_usd": "0.16845", "prompt_tokens": "7830", "completion_tokens": "680", "in_group_std": "Legitimate offspring", "out_group_std": "Illegitimate offspring", "resource_std": "Inheritance"}, {"work_name": "Works and Days", "author": "Hesiod", "impact_year": "-740", "polity": "Greek City-States", "criterion_category": "AGE", "criterion_label": "Mature men (40+) trusted with important agricultural work", "in_group": "Men of forty years", "out_group": "Younger men", "resource": "Employment in skilled agricultural positions", "speaker": "narrator", "verbatim": "Let a brisk fellow of forty years follow them, with a loaf of four quarters and eight slices for his dinner, one who will attend to his work and drive a straight furrow and is past the age for gaping after his fellows, but will keep his mind on his work.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0020/tlg002/tlg0020.tlg002.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (20 passages, 8 pages from original 21 pages)", "matched_keywords": "age, aged, deprive, right, work", "extraction_cost_usd": "0.16845", "prompt_tokens": "7830", "completion_tokens": "680", "in_group_std": "Men", "out_group_std": "Young/Minors", "resource_std": "Economic activity"}, {"work_name": "On The Estate of Cleonymus", "author": "Isaeus", "impact_year": "-384", "polity": "Peloponnesian League", "criterion_category": "BIRTH_LINEAGE", "criterion_label": "Inheritance rights restricted to legitimate relatives", "in_group": "Legitimate relatives/next of kin", "out_group": "Non-relatives/those without kinship ties", "resource": "Inheritance of property", "speaker": "narrator", "verbatim": "We were Cleonymus's nearest relatives, and lived on terms of greater intimacy with him than anyone else; and the laws have given us the right of succession as next of kin, as also did Cleonymus himself, owing to the affection which subsisted between us. And, further, Polyarchus, Cleonymus's father and our grandfather, gave instructions that, if Cleonymus should die without issue, he was to leave his property to us.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0017/tlg001/tlg0017.tlg001.perseus-eng2.txt", "extraction_method": "FULL_TEXT (22,497 chars ≈ 9 pages)", "matched_keywords": "father, law, laws, poverty, property, right, rights, slave", "extraction_cost_usd": "0.157425", "prompt_tokens": "8190", "completion_tokens": "461", "in_group_std": "Legitimate offspring", "out_group_std": "Non-relatives", "resource_std": "Inheritance"}, {"work_name": "On The Estate of Cleonymus", "author": "Isaeus", "impact_year": "-384", "polity": "Peloponnesian League", "criterion_category": "BIRTH_LINEAGE", "criterion_label": "Legal obligations to support family members based on kinship", "in_group": "Close relatives by blood", "out_group": "Non-relatives", "resource": "Right to inherit and obligation to support family", "speaker": "narrator", "verbatim": "If Polyarchus, the father of Cleonymus and our grandfather, were alive and lacked the necessities of life, or if Cleonymus had died leaving daughters unprovided for, we should have been obliged on grounds of affinity to support our grandfather, and either ourselves marry Cleonymus's daughters or else provide dowries and find other husbands for them—the claims of kinship, the laws, and public opinion in Athens would have forced us to do this or else become liable to heavy punishment and extreme disgrace—but now that property has been left, will you regard it as just that others, rather than we, should inherit it?", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0017/tlg001/tlg0017.tlg001.perseus-eng2.txt", "extraction_method": "FULL_TEXT (22,497 chars ≈ 9 pages)", "matched_keywords": "alien, athenians, daughter, denied, disgrace, dowry, father, husband, inherit, inheritance, law, laws, mother, poverty, property", "extraction_cost_usd": "0.157425", "prompt_tokens": "8190", "completion_tokens": "461", "in_group_std": "Legitimate offspring", "out_group_std": "Non-relatives", "resource_std": "Inheritance"}, {"work_name": "Against Callimachus", "author": "Isocrates", "impact_year": "-400", "polity": "Peloponnesian League", "criterion_category": "CITIZENSHIP", "criterion_label": "Loss of civic rights for unpaid court fines", "in_group": "Citizens who pay court fines", "out_group": "Citizens who fail to pay court fines", "resource": "Civic rights (voting, holding office, legal standing)", "speaker": "author", "verbatim": "If Callimachus lost the suit, he would be liable to a fine (ἡ ἐπωβελία) of one-sixth of the sum at which the damages were laid. and also if then because he possessed property he was forced to go into exile, yet now, at a time when he ought to get satisfaction for wrongs done him, he is to be deprived of his civic rights. If the fine should not be paid within the appointed period of time, Callimachus would lose his rights as a citizen.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0010/tlg002/tlg0010.tlg002.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (12 passages, 8 pages from original 16 pages)", "matched_keywords": "citizen, citizens, deprive, deprived, exile, exiled, possess, possession, poverty, property, right, rights", "extraction_cost_usd": "0.14865", "prompt_tokens": "7540", "completion_tokens": "474", "in_group_std": "Citizens", "out_group_std": "Morally condemned", "resource_std": "Political participation"}, {"work_name": "Against Callimachus", "author": "Isocrates", "impact_year": "-400", "polity": "Peloponnesian League", "criterion_category": "MORAL_CONDUCT", "criterion_label": "Expulsion from citizenship rolls by the Thirty", "in_group": "Citizens in good standing with the oligarchy", "out_group": "Citizens expelled by the Thirty", "resource": "Citizenship status and associated rights", "speaker": "author", "verbatim": "For if I were so audacious a man as to wrong others, you would with good reason condemn me as doing wrong to him also; but as it is, I shall be found innocent of having harmed any citizen in regard to his property, or of jeopardizing his life, or of having expunged his name from the list of active citizens, or of having inscribed his name on Lysander's list. A list of citizens who were deprived of their civic rights; cf. Isoc. 21.2 and Xen. Hell. 2.3.17-19.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0010/tlg002/tlg0010.tlg002.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (12 passages, 8 pages from original 16 pages)", "matched_keywords": "citizen, citizens, citizenship, deprive, deprived, heir, man, mother, native, poverty, property, right, rights, scribe", "extraction_cost_usd": "0.14865", "prompt_tokens": "7540", "completion_tokens": "474", "in_group_std": "Citizens", "out_group_std": "Morally condemned", "resource_std": "Citizenship"}, {"work_name": "Panathenaicus", "author": "Isocrates", "impact_year": "-400", "polity": "Peloponnesian League", "criterion_category": "MORAL_CONDUCT", "criterion_label": "Prostitution bars citizens from holding high political office", "in_group": "Citizens who have not prostituted themselves", "out_group": "Citizens who have prostituted their persons", "resource": "Hold political office (archonship)", "speaker": "author", "verbatim": "and not even to suffer men to be heard who lend their own persons to base practices but deem themselves worthy to advise others how they should govern the state in order to advance in sobriety and well-being, or who have squandered what they inherited from their fathers on shameful pleasures but seek to repair their own fortunes from the public treasury", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0010/tlg021/tlg0010.tlg021.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (29 passages, 8 pages from original 72 pages)", "matched_keywords": "estate, father, fortune, govern, heir, inherit, inheritance, men, mother, older, shame, squander, statute", "extraction_cost_usd": "0.149025", "prompt_tokens": "7690", "completion_tokens": "449", "in_group_std": "Morally upright", "out_group_std": "Morally condemned", "resource_std": "Political participation"}, {"work_name": "Panathenaicus", "author": "Isocrates", "impact_year": "-400", "polity": "Peloponnesian League", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Perioeci reduced to subordinate status without political rights", "in_group": "Spartan citizens", "out_group": "Perioeci (subjugated population)", "resource": "Political rights and land ownership", "speaker": "author", "verbatim": "they themselves did nothing of the sort, but instead set up amongst their own class the only kind of equality and democracy which is possible if men are to be at all times in complete accord, while reducing the mass of the people to the condition of Perioeci, subjecting their spirits to a bondage no less abject than that endured by slaves. And having done this, they disposed of the land, of which by right every man should have had an equal share, seizing for themselves—the few—not only the richest but more than any of the Hellenes possess, while to the mass of the people they apportioned only enough of the poorest land so that by working laboriously they could hardly gain their daily bread.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0010/tlg021/tlg0010.tlg021.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (29 passages, 8 pages from original 72 pages)", "matched_keywords": "bondage, heir, land, man, men, possess, possession, qualify, right, rights, shame, slave, slaves, work", "extraction_cost_usd": "0.149025", "prompt_tokens": "7690", "completion_tokens": "449", "in_group_std": "Citizens", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Political participation"}, {"work_name": "The Parasite Tychiades", "author": "Lucian of Samosata", "impact_year": "155", "polity": "Kingdom of Osroene", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Free persons have access to trades and professions while slaves have limited options", "in_group": "Free persons", "out_group": "Slaves", "resource": "Access to trades and professions", "speaker": "Tychiades", "verbatim": "Tychiades I am curious about you, Simon. Ordinary people, free and slaves alike, have some trade or profession that enables them to benefit themselves and others; you seem to be an exception.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0062/tlg030/tlg0062.tlg030.perseus-eng4.txt", "extraction_method": "HYBRID_EXTRACTED (18 passages, 8 pages from original 17 pages)", "matched_keywords": "alien, free, freed, mother, possession, profession, slave, slaves, trade, trader", "extraction_cost_usd": "0.148785", "prompt_tokens": "8169", "completion_tokens": "350", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Economic activity"}, {"work_name": "The Parasite Tychiades", "author": "Lucian of Samosata", "impact_year": "155", "polity": "Kingdom of Osroene", "criterion_category": "BIRTH_LINEAGE", "criterion_label": "Those of noble birth have access to political power while those of mean extraction do not", "in_group": "Those of noble birth", "out_group": "Those of mean extraction", "resource": "Political power and influence", "speaker": "Simon", "verbatim": "Again, did not Aristogiton, poor and of mean extraction, as Thucydides describes him, sponge on Harmodius? He was also, of course, in love with him—a quite natural relation between the two classes. This sponger it was, then, who delivered Athens from tyranny, and now adorns the marketplace in bronze, side by side with the object of his passion.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0062/tlg030/tlg0062.tlg030.perseus-eng4.txt", "extraction_method": "HYBRID_EXTRACTED (18 passages, 8 pages from original 17 pages)", "matched_keywords": "athenians, man, men, naturalized, poor, scribe", "extraction_cost_usd": "0.148785", "prompt_tokens": "8169", "completion_tokens": "350", "in_group_std": "Nobles", "out_group_std": "Illegitimate offspring", "resource_std": "Political participation"}, {"work_name": "Dialogues of the Gods", "author": "Lucian of Samosata", "impact_year": "155", "polity": "Kingdom of Osroene", "criterion_category": "GENDER", "criterion_label": "Women excluded from decision-making in public affairs", "in_group": "Men", "out_group": "Women", "resource": "Decision-making power in public affairs", "speaker": "author", "verbatim": "It is for the man to take care of business outside the house; let no woman make decrees in those matters", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0062/tlg068/tlg0062.tlg068.perseus-eng4.txt", "extraction_method": "HYBRID_EXTRACTED (21 passages, 9 pages from original 18 pages)", "matched_keywords": "decree, man, masters, woman, women", "extraction_cost_usd": "0.162045", "prompt_tokens": "9053", "completion_tokens": "350", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Political participation"}, {"work_name": "Dialogues of the Gods", "author": "Lucian of Samosata", "impact_year": "155", "polity": "Kingdom of Osroene", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Slaves excluded from personal freedom and legal autonomy", "in_group": "Free persons", "out_group": "Natural slaves", "resource": "Personal freedom and legal autonomy", "speaker": "author", "verbatim": "It is manifest therefore that there are cases of people of whom some are freemen and the others slaves by nature...", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0062/tlg068/tlg0062.tlg068.perseus-eng4.txt", "extraction_method": "HYBRID_EXTRACTED (21 passages, 9 pages from original 18 pages)", "matched_keywords": "freedman, freedmen, mature, mother, naturalized, slave, slaves", "extraction_cost_usd": "0.162045", "prompt_tokens": "9053", "completion_tokens": "350", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Freedom"}, {"work_name": "Dialogues of the Gods", "author": "Lucian of Samosata", "impact_year": "155", "polity": "Kingdom of Osroene", "criterion_category": "GENDER", "criterion_label": "Women subject to male political authority", "in_group": "Men", "out_group": "Women", "resource": "Political authority and governance", "speaker": "author", "verbatim": "Again, as between the sexes, the male is by nature superior and the female inferior, the male ruler and the female subject.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0062/tlg068/tlg0062.tlg068.perseus-eng4.txt", "extraction_method": "HYBRID_EXTRACTED (21 passages, 9 pages from original 18 pages)", "matched_keywords": "female, male, mature, naturalized, rule, sex", "extraction_cost_usd": "0.162045", "prompt_tokens": "9053", "completion_tokens": "350", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Political participation"}, {"work_name": "Description of Greece", "author": "Pausanias", "impact_year": "150", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "GENDER", "criterion_label": "Women forbidden from entering grove of Ares", "in_group": "Men", "out_group": "Women", "resource": "Access to religious space and participation in festival", "speaker": "author", "verbatim": "Every year they hold a festival in honor of the God, at which women are forbidden to enter the grove.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0525/tlg001/tlg0525.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (33 passages, 9 pages from original 617 pages)", "matched_keywords": "forbid, forbidden, old, woman, women", "extraction_cost_usd": "0.165375", "prompt_tokens": "8620", "completion_tokens": "481", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "EXCLUDE_RELIGIOUS"}, {"work_name": "Description of Greece", "author": "Pausanias", "impact_year": "150", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "CITIZENSHIP", "criterion_label": "Roman citizens' children denied inheritance rights", "in_group": "Roman citizens", "out_group": "Children of Roman citizens considered of Greek nationality", "resource": "Inheritance rights", "speaker": "author", "verbatim": "There was a certain law whereby provincials who were themselves of Roman citizenship, while their children were considered of Greek nationality, were forced either to leave their property to strangers or let it increase the wealth of the emperor. Antoninus permitted all such to give to the children their heritage, choosing rather to show himself benevolent than to retain a law that swelled his riches.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0525/tlg001/tlg0525.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (33 passages, 9 pages from original 617 pages)", "matched_keywords": "children, citizens, citizenship, father, heir, law, laws, permit, permitted, poverty, property, rich, slave, stranger, strangers, wealth, wealthy, woman", "extraction_cost_usd": "0.165375", "prompt_tokens": "8620", "completion_tokens": "481", "in_group_std": "Citizens", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Inheritance"}, {"work_name": "Description of Greece", "author": "Pausanias", "impact_year": "150", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "BIRTH_LINEAGE", "criterion_label": "Succession rights based on legitimacy and physical ability", "in_group": "Legitimate sons without physical disabilities", "out_group": "Those with physical disabilities", "resource": "Right to rule/kingship", "speaker": "author", "verbatim": "A few years afterwards Medon and Neileus, the oldest of the sons of Codrus, quarrelled about the rule, and Neileus refused to allow Medon to rule over him, because he was lame in one foot. The disputants agreed to refer the matter to the Delphic oracle, and the Pythian priestess gave the kingdom of Athens to Medon.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0525/tlg001/tlg0525.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (33 passages, 9 pages from original 617 pages)", "matched_keywords": "aged, allow, allowed, athenians, govern, master, priest, priestess, rule, son", "extraction_cost_usd": "0.165375", "prompt_tokens": "8620", "completion_tokens": "481", "in_group_std": "Legitimate offspring", "out_group_std": "Disabled", "resource_std": "Political participation"}, {"work_name": "Nemean Odes", "author": "Pindar", "impact_year": "-481", "polity": "Greek City-States", "criterion_category": "GENDER", "criterion_label": "Men have superior political authority over women", "in_group": "Men", "out_group": "Women", "resource": "Political authority and governance", "speaker": "author", "verbatim": "Again, as between the sexes, the male is by nature superior and the female inferior, the male ruler and the female subject.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0033/tlg003/tlg0033.tlg003.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (26 passages, 8 pages from original 21 pages)", "matched_keywords": "female, male, mature, naturalized, rule, sex", "extraction_cost_usd": "0.13899", "prompt_tokens": "8071", "completion_tokens": "239", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Political participation"}, {"work_name": "Nemean Odes", "author": "Pindar", "impact_year": "-481", "polity": "Greek City-States", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Natural distinction between free persons and slaves", "in_group": "Free persons", "out_group": "Natural slaves", "resource": "Personal freedom and legal autonomy", "speaker": "author", "verbatim": "It is manifest therefore that there are cases of people of whom some are freemen and the others slaves by nature...", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0033/tlg003/tlg0033.tlg003.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (26 passages, 8 pages from original 21 pages)", "matched_keywords": "freedman, freedmen, mature, mother, naturalized, slave, slaves", "extraction_cost_usd": "0.13899", "prompt_tokens": "8071", "completion_tokens": "239", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Freedom"}, {"work_name": "Plataicus", "author": "Isocrates", "impact_year": "-400", "polity": "Peloponnesian League", "criterion_category": "CITIZENSHIP", "criterion_label": "Citizenship rights through intermarriage", "in_group": "Those with Athenian citizenship rights", "out_group" const annotationState = {};  // index -> comment text

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    if (tab === 'explore') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('tab-explore').classList.add('active');
    } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('tab-annotate').classList.add('active');
        renderSample();
        renderAnnotationDashboard();
    }
}

function updateAnnotationProgress() {
    const commented = Object.keys(annotationState).length;
    const voted = Object.keys(voteState).length;
    const done = Math.max(commented, voted);
    const total = SAMPLE_INDICES.length;
    const pct = total > 0 ? (done / total) * 100 : 0;
    document.getElementById('annotation-count').textContent = `${done} / ${total} annotated`;
    document.getElementById('annotation-bar').style.width = `${pct}%`;
}

function saveSampleComment(dataIndex) {
    const comment = document.getElementById(`sample-comment-${dataIndex}`).value;
    if (!comment.trim()) return;

    annotationState[dataIndex] = comment;
    const d = DATA[dataIndex];

    fetch('/save_comment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...d, comment, sample: 'stratified_v4' })
    }).then(r => {
        if (r.ok) {
            const statusEl = document.getElementById(`sample-status-${dataIndex}`);
            statusEl.textContent = '✓ Saved';
            setTimeout(() => statusEl.textContent = '', 2000);
            const badgeEl = document.getElementById(`sample-badge-${dataIndex}`);
            if (badgeEl) {
                badgeEl.className = 'annotation-status status-done';
                badgeEl.textContent = 'done';
            }
            updateAnnotationProgress();
        }
    });
}

const voteState = {};  // index -> 'up' or 'down'

function stdTag(val) {
    if (!val) return '';
    return `<span class="std-tag">${val}</span>`;
}

function vote(idx, direction) {
    voteState[idx] = direction;
    const upBtn = document.getElementById(`vote-up-${idx}`);
    const downBtn = document.getElementById(`vote-down-${idx}`);
    upBtn.className = 'vote-btn' + (direction === 'up' ? ' selected-up' : '');
    downBtn.className = 'vote-btn' + (direction === 'down' ? ' selected-down' : '');

    const d = DATA[idx];
    fetch('/save_comment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...d, comment: document.getElementById(`sample-comment-${idx}`)?.value || '', vote: direction, sample: 'stratified_v7' })
    });

    const badgeEl = document.getElementById(`sample-badge-${idx}`);
    if (badgeEl) {
        badgeEl.className = 'annotation-status status-done';
        badgeEl.textContent = 'done';
    }
    updateAnnotationProgress();
    renderAnnotationDashboard();
}

function renderAnnotationDashboard() {
    const dashboard = document.getElementById('annotation-dashboard');
    if (!dashboard) return;

    // Group sample items by category
    const catData = {};
    SAMPLE_INDICES.forEach(idx => {
        const d = DATA[idx];
        const cat = d.criterion_category || 'UNKNOWN';
        if (!catData[cat]) catData[cat] = [];
        catData[cat].push(idx);
    });

    // Count votes per category
    const cats = Object.keys(catData).sort();
    let totalUp = 0, totalDown = 0, totalPending = 0;

    const rows = cats.map(cat => {
        const indices = catData[cat];
        let up = 0, down = 0, pending = 0;
        indices.forEach(idx => {
            if (voteState[idx] === 'up') up++;
            else if (voteState[idx] === 'down') down++;
            else pending++;
        });
        totalUp += up; totalDown += down; totalPending += pending;
        const total = indices.length;
        const upPct = (up / total) * 100;
        const downPct = (down / total) * 100;
        const pendingPct = (pending / total) * 100;

        return `<div class="ann-cat-row">
            <div class="ann-cat-name">${cat} (${total})</div>
            <div class="ann-bar">
                <div class="ann-bar-up" style="width:${upPct}%"></div>
                <div class="ann-bar-down" style="width:${downPct}%"></div>
                <div class="ann-bar-pending" style="width:${pendingPct}%"></div>
            </div>
            <div class="ann-cat-counts">
                <span class="ann-up">&#128077; ${up}</span>
                <span class="ann-down">&#128078; ${down}</span>
                <span class="ann-pending">? ${pending}</span>
            </div>
        </div>`;
    }).join('');

    const totalAll = totalUp + totalDown + totalPending;
    const accuracy = totalAll - totalPending > 0 ? ((totalUp / (totalUp + totalDown)) * 100).toFixed(0) : '-';

    dashboard.innerHTML = `
        <h2>Annotation Results by Category</h2>
        ${rows}
        <div class="ann-cat-row" style="border-top: 2px solid #333; margin-top: 0.5rem; padding-top: 0.75rem; font-weight: 600;">
            <div class="ann-cat-name">TOTAL (${totalAll})</div>
            <div class="ann-bar">
                <div class="ann-bar-up" style="width:${totalUp/totalAll*100}%"></div>
                <div class="ann-bar-down" style="width:${totalDown/totalAll*100}%"></div>
                <div class="ann-bar-pending" style="width:${totalPending/totalAll*100}%"></div>
            </div>
            <div class="ann-cat-counts">
                <span class="ann-up">&#128077; ${totalUp}</span>
                <span class="ann-down">&#128078; ${totalDown}</span>
                <span class="ann-pending">? ${totalPending}</span>
            </div>
        </div>
        <div style="margin-top:1rem; font-size:0.85rem; color:#555;">
            Accuracy (valid / annotated): <strong>${accuracy}%</strong>
        </div>
    `;
}

function exportAnnotations() {
    const rows = [['work_name','author','impact_year','polity','criterion_category','criterion_label',
                   'in_group','in_group_std','out_group','out_group_std','resource','resource_std',
                   'speaker','verbatim','matched_keywords','vote','comment',
                   'prompt_version','llm_model','embedding_model','extraction_method',
                   'total_criteria','total_works','sample_size']];

    let annotated = 0;
    SAMPLE_INDICES.forEach(idx => {
        const d = DATA[idx];
        const v = voteState[idx] || '';
        const c = annotationState[idx] || '';
        if (v || c) annotated++;
        rows.push([
            d.work_name, d.author, d.impact_year, d.polity,
            d.criterion_category, d.criterion_label,
            d.in_group, d.in_group_std || '', d.out_group, d.out_group_std || '',
            d.resource, d.resource_std || '',
            d.speaker, d.verbatim, d.matched_keywords || '',
            v, c,
            RUN_META.prompt_version, RUN_META.llm_model, RUN_META.embedding_model,
            RUN_META.extraction_method, RUN_META.total_criteria,
            RUN_META.total_works, RUN_META.sample_size
        ]);
    });

    // CSV encode
    const csvContent = rows.map(row =>
        row.map(cell => {
            const s = String(cell).replace(/"/g, '""');
            return s.includes(',') || s.includes('"') || s.includes('
') ? `"${s}"` : s;
        }).join(',')
    ).join('
');

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `annotation_export_${RUN_META.prompt_version}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);

    document.getElementById('export-info').textContent = `Exported ${annotated} annotated / ${SAMPLE_INDICES.length} total`;
}

function renderKeywords(d) {
    if (!d.matched_keywords || d.matched_keywords.trim() === '') return '';
    const tags = d.matched_keywords.split(', ').map(k => `<span class="keyword-tag">${k}</span>`).join('');
    return `<div class="keywords-box">
        <div class="group-label">Matched Keywords</div>
        ${tags}
    </div>`;
}

function countBy(arr, key) {
    const counts = {};
    arr.forEach(d => {
        const val = d[key] || 'Unknown';
        counts[val] = (counts[val] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]);
}

        ).join('');

        return `<div class="category-section">
            <div class="category-section-header" onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.toggle').textContent = this.nextElementSibling.classList.contains('open') ? '&#9660;' : '&#9654;';" style="border-left: 4px solid ${color}">
                <span>${cat} <span style="color:#888; font-weight:400">(${count})</span></span>
                <span class="toggle">&#9654;</span>
            </div>
            <div class="category-section-body">
                <div class="detail-columns">
                    <div class="detail-col col-in">
                        <h4>In-Groups</h4>
                        <ul>${renderList(inGroups)}</ul>
                    </div>
                    <div class="detail-col col-out">
                        <h4>Out-Groups</h4>
                        <ul>${renderList(outGroups)}</ul>
                    </div>
                    <div class="detail-col col-res">
                        <h4>Resources</h4>
                        <ul>${renderList(resources)}</ul>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');

    dashboard.innerHTML = `
        <h2>Category Distribution</h2>
        ${bars}
        <div class="category-details">
            <h2 style="margin-top:1.5rem">Details by Category</h2>
            ${details}
        </div>
    `;
}

function renderCards(filtered) {
    const container = document.getElementById('results');
    const stats = document.getElementById('stats');

    renderDashboard(filtered);

    stats.innerHTML = `
        <span>Showing <strong>${filtered.length}</strong> of <strong>${DATA.length}</strong></span>
        <span>Works: <strong>${new Set(filtered.map(d => d.work_name)).size}</strong></span>
    `;

    if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results">No criteria match your filters.</div>';
        return;
    }

    container.innerHTML = filtered.map((d, i) => `
        <div class="card">
            <div class="card-header">
                <div class="card-title">${d.work_name}</div>
                <div class="card-meta">
                    <span>${d.author}</span>
                    <span>${d.impact_year}</span>
                    <span>${d.polity}</span>
                </div>
            </div>
            <div class="card-body">
                <div class="badges">
                    <span class="badge badge-category">${d.criterion_category}</span>
                    <span class="badge badge-label">${d.criterion_label}</span>
                    ${d.speaker ? `<span class="badge badge-speaker">${d.speaker}</span>` : ''}
                    <span class="badge badge-method">${d.extraction_method}</span>
                </div>
                <div class="groups-row">
                    <div class="group-box in-group">
                        <div class="group-label">In-Group</div>
                        <div class="group-value">${d.in_group}${stdTag(d.in_group_std)}</div>
                    </div>
                    <div class="group-box out-group">
                        <div class="group-label">Out-Group</div>
                        <div class="group-value">${d.out_group}${stdTag(d.out_group_std)}</div>
                    </div>
                </div>
                <div class="resource-box">
                    <div class="group-label">Resource</div>
                    <div class="group-value">${d.resource}${stdTag(d.resource_std)}</div>
                </div>
                <div class="verbatim">"${d.verbatim}"</div>
                ${renderKeywords(d)}

                <div class="comment-section">
                    <label>Your Feedback</label>
                    <textarea class="comment-input" id="comment-${i}" placeholder="Add feedback..."></textarea>
                    <div class="comment-actions">
                        <button class="save-btn" onclick="saveComment(${i})">Save</button>
                        <span class="save-status" id="status-${i}"></span>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

function applyFilters() {
    const category = document.getElementById('filterCategory').value;
    const author = document.getElementById('filterAuthor').value;
    const polity = document.getElementById('filterPolity').value;
    const search = document.getElementById('filterSearch').value.toLowerCase();

    const filtered = DATA.filter(d => {
        if (category && d.criterion_category !== category) return false;
        if (author && d.author !== author) return false;
        if (polity && d.polity !== polity) return false;
        if (search && !d.verbatim.toLowerCase().includes(search) && !d.criterion_label.toLowerCase().includes(search)) return false;
        return true;
    });

    renderCards(filtered);
}

function clearFilters() {
    document.getElementById('filterCategory').value = '';
    document.getElementById('filterAuthor').value = '';
    document.getElementById('filterPolity').value = '';
    document.getElementById('filterSearch').value = '';
    applyFilters();
}

async function saveComment(index) {
    const comment = document.getElementById(`comment-${index}`).value;
    if (!comment.trim()) return;

    const d = DATA[index];
    try {
        const response = await fetch('/save_comment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...d, comment })
        });
        if (response.ok) {
            document.getElementById(`status-${index}`).textContent = '✓ Saved';
            setTimeout(() => document.getElementById(`status-${index}`).textContent = '', 2000);
        }
    } catch (e) {
        document.getElementById(`status-${index}`).textContent = 'Error';
    }
}

document.getElementById('filterCategory').addEventListener('change', applyFilters);
document.getElementById('filterAuthor').addEventListener('change', applyFilters);
document.getElementById('filterPolity').addEventListener('change', applyFilters);
document.getElementById('filterSearch').addEventListener('input', applyFilters);

applyFilters();
renderAnnotationDashboard();
</script>
</body>
</html>
