        .ann-bar-up { background: #4caf50; height: 100%; }
        .ann-bar-down { background: #e53935; height: 100%; }
        .ann-bar-pending { background: #e0e0e0; height: 100%; }

, govern, heir, men, mistress, mother, office, offspring, statute, work", "extraction_cost_usd": "0.175905", "prompt_tokens": "7972", "completion_tokens": "751", "in_group_std": "Free persons", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Political participation"}, {"work_name": "On the Embassy", "author": "Aeschines", "impact_year": "-354", "polity": "Second Athenian League", "criterion_category": "BIRTH_LINEAGE", "criterion_label": "Pure Athenian lineage required for full citizenship", "in_group": "Those of pure Athenian descent", "out_group": "Those with foreign ancestry (e.g., Scythian)", "resource": "Full citizenship rights and enrollment in citizen lists", "speaker": "Aeschines", "verbatim": "for Atrometus our father, whom you slander, though you do not know him and never saw what a man he was in his prime—you, Demosthenes, a descendant through your mother of the nomad Scythians—our father went into exile in the time of the Thirty, and later helped to restore the democracy... But I am amazed if you dare slander Philon, and that, too, in the presence of the most reputable men of Athens, who, having come in here to render their verdict for the best interest of the state, are thinking more about the lives we have lived than what we say. Aeschines insinuates that only by some extraordinary favoritism could Demosthenes, with his strain of Scythian blood, ever have been recognized as an Athenian of pure blood, and so enrolled in the citizen-list when he came to manhood.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0026/tlg002/tlg0026.tlg002.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (25 passages, 8 pages from original 48 pages)", "matched_keywords": "athenian, athenians, blood, citizen, citizens, descent, edict, estate, exile, exiled, father, gender, heir, man, men, mother, squander, statute, wives", "extraction_cost_usd": "0.175905", "prompt_tokens": "7972", "completion_tokens": "751", "in_group_std": "Nobles", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Citizenship"}, {"work_name": "On the Embassy", "author": "Aeschines", "impact_year": "-354", "polity": "Second Athenian League", "criterion_category": "AGE", "criterion_label": "Age requirement for military service", "in_group": "Citizens up to age 40", "out_group": "Citizens over age 40", "resource": "Military service obligation", "speaker": "Aeschines", "verbatim": "But when you had passed a decree that the Phocians should hand over these posts to your general Proxenus, and that you should man fifty triremes, and that all citizens up to the age of forty years should take part in the expedition, then instead of surrendering the Posts to Proxenus, the tyrants arrested those ambassadors of their own who had offered to hand over the garrison posts to you", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0026/tlg002/tlg0026.tlg002.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (25 passages, 8 pages from original 48 pages)", "matched_keywords": "age, aged, citizen, citizens, citizenship, decree, govern, heir, man", "extraction_cost_usd": "0.175905", "prompt_tokens": "7972", "completion_tokens": "751", "in_group_std": "Citizens", "out_group_std": "Elders", "resource_std": "Civic obligations"}, {"work_name": "Against Timarchus", "author": "Aeschines", "impact_year": "-354", "polity": "Second Athenian League", "criterion_category": "MORAL_CONDUCT", "criterion_label": "Prostitution bars citizens from holding political office and speaking in assembly", "in_group": "Citizens who have not prostituted themselves", "out_group": "Citizens who have prostituted themselves", "resource": "Political office (archons, priests), legal advocacy, public speaking rights, participation in sacrifices", "speaker": "Aeschines", "verbatim": "If any Athenian shall have prostituted his person, he shall not be permitted to become one of the nine archons, nor to discharge the office of priest, nor to act as an advocate for the state, nor shall he hold any office whatsoever, at home or abroad, whether filled by lot or by election; he shall not be sent as a herald; he shall not take part in debate, nor be present at public sacrifices; when the citizens are wearing garlands, he shall wear none; and he shall not enter within the limits of the place that has been purified for the assembling of the people. If any man who has been convicted of prostitution act contrary to these prohibitions, he shall be put to death.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0026/tlg001/tlg0026.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (25 passages, 8 pages from original 51 pages)", "matched_keywords": "archon, assembly, athenian, athenians, citizen, citizens, citizenship, estate, herald, man, office, old, permit, permitted, priest, priestess, prohibit, prohibited, prostitute, prostitution, resident, senate, statute", "extraction_cost_usd": "0.171315", "prompt_tokens": "7856", "completion_tokens": "713", "in_group_std": "Morally upright", "out_group_std": "Morally condemned", "resource_std": "Political participation"}, {"work_name": "Against Timarchus", "author": "Aeschines", "impact_year": "-354", "polity": "Second Athenian League", "criterion_category": "AGE", "criterion_label": "Citizens over fifty have priority in addressing the assembly", "in_group": "Citizens above fifty years of age", "out_group": "Citizens under fifty years of age", "resource": "Priority in speaking at the assembly", "speaker": "Aeschines", "verbatim": "After the purifying sacrifice has been carried round and the herald has offered the traditional prayers, the presiding officers are commanded to declare to be next in order the discussion of matters pertaining to the national religion, the reception of heralds and ambassadors, and t , masters, slave, slaves, youth", "extraction_cost_usd": "0.171315", "prompt_tokens": "7856", "completion_tokens": "713", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Property/Wealth"}, {"work_name": "Seven Against Thebes", "author": "Aeschylus", "impact_year": "-489", "polity": "Greek City-States", "criterion_category": "GENDER", "criterion_label": "Men control public decision-making; women excluded from political authority", "in_group": "Men", "out_group": "Women", "resource": "Political authority and governance", "speaker": "Chorus", "verbatim": "Again, as between the sexes, the male is by nature superior and the female inferior, the male ruler and the female subject.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0085/tlg004/tlg0085.tlg004.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (22 passages, 8 pages from original 26 pages)", "matched_keywords": "female, male, mature, naturalized, rule, sex", "extraction_cost_usd": "0.157605", "prompt_tokens": "7917", "completion_tokens": "518", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Political participation"}, {"work_name": "Seven Against Thebes", "author": "Aeschylus", "impact_year": "-489", "polity": "Greek City-States", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Free persons maintain freedom; slaves subject to bondage", "in_group": "Free persons", "out_group": "Slaves", "resource": "Personal freedom and legal autonomy", "speaker": "Messenger", "verbatim": "Take heart, you daughters who were nurtured by your mother. Our city has escaped the yoke of slavery; the boasts of the powerful men have fallen to the ground.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0085/tlg004/tlg0085.tlg004.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (22 passages, 8 pages from original 26 pages)", "matched_keywords": "daughter, men, mother, power, slave, slavery", "extraction_cost_usd": "0.157605", "prompt_tokens": "7917", "completion_tokens": "518", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Freedom"}, {"work_name": "Seven Against Thebes", "author": "Aeschylus", "impact_year": "-489", "polity": "Greek City-States", "criterion_category": "CITIZENSHIP", "criterion_label": "Citizens receive honorable burial; enemies of the state denied burial rights", "in_group": "Citizens loyal to the city", "out_group": "Those who attack the city", "resource": "Right to burial and funeral honors", "speaker": "Herald", "verbatim": "It is decreed, first, that Eteocles here, on account of his goodwill towards the city, is to be buried in a kindly grave in its soil; for hating the enemy he chose death in the city and driven by piety towards his ancestral shrines, he died without reproach where it is an honor for the young to die. This is how I was commanded to speak regarding him. But as for his brother, it is decreed that this corpse of Polyneices is to be cast out of the city unburied to be torn by dogs, since he would have been the destroyer of the land of the Cadmeans, if one of the gods had not used his brother's spear to prevent him.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0085/tlg004/tlg0085.tlg004.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (22 passages, 8 pages from original 26 pages)", "matched_keywords": "ancestor, decree, denied, land, young, younger", "extraction_cost_usd": "0.157605", "prompt_tokens": "7917", "completion_tokens": "518", "in_group_std": "Citizens", "out_group_std": "Exiles", "resource_std": "Burial rights"}, {"work_name": "On His Return", "author": "Andocides", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "CITIZENSHIP", "criterion_label": "Civic rights reserved for citizens", "in_group": "Citizens", "out_group": "Slaves and foreigners", "resource": "Civic rights and monetary grants", "speaker": "Andocides", "verbatim": "I often see you bestowing civic rights and substantial grants of money upon both slaves and foreigners from every part of the world, if they prove to have done you some service. And you are acting wisely in making such gifts; they engender the greatest possible willingness to serve you.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0027/tlg002/tlg0027.tlg002.perseus-eng2.txt", "extraction_method": "FULL_TEXT (16,263 chars ≈ 7 pages)", "matched_keywords": "foreigner, foreigners, gender, right, rights, servile, slave, slaves", "extraction_cost_usd": "0.11142", "prompt_tokens": "6578", "completion_tokens": "170", "in_group_std": "Citizens", "out_group_std": "Slaves", "resource_std": "Citizenship"}, {"work_name": "Against Ctesiphon", "author": "Aeschines", "impact_year": "-354", "polity": "Second Athenian League", "criterion_category": "AGE", "criterion_label": "Priority in speaking at the assembly based on age", "in_group": "Older citizens", "out_group": "Younger citizens", "resource": "Priority in speaking at the assembly", "speaker": "Aeschines", "verbatim": "I could wish, indeed, fellow citizens, that the Senate of Five Hundred and the assemblies of the people were properly conducted by those who preside over them, and the laws enforced which Solon enacted to secure orderly conduct on the part of public speakers; for then it would be permitted to the oldest citizen, as the law prescribes, to come forward to the platform first, with dignity, and, uninterrupted by shouting and tumult, out of his experience to advise for the good of the state and it would then be permitted to all other citizens who wished, one by one in turn, in order of age, to express their opinion on every question; for so, I think, the state would be best governed, and least litigation would arise.", "file_path": "/U  "Free men", "out_group": "Slaves", "resource": "Right to participate in civic/religious defense", "speaker": "Aeschines", "verbatim": "As it was already late in the day, the herald came forward and made proclamation that all the men of Delphi who were of full age, slaves and free men alike, should come at daybreak on the morrow with shovels and mattocks to the place that is there called the Thyteion.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0026/tlg003/tlg0026.tlg003.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (25 passages, 8 pages from original 68 pages)", "matched_keywords": "age, aged, alien, free, freed, herald, maiden, men, slave, slaves", "extraction_cost_usd": "0.196545", "prompt_tokens": "7928", "completion_tokens": "1035", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Legal standing"}, {"work_name": "Against Ctesiphon", "author": "Aeschines", "impact_year": "-354", "polity": "Second Athenian League", "criterion_category": "CITIZENSHIP", "criterion_label": "Citizenship restricted to those with Athenian parents", "in_group": "Those with pure Athenian blood through both parents", "out_group": "Those with foreign parent(s)", "resource": "Citizenship and ability to bear legitimate children", "speaker": "Aeschines", "verbatim": "This wife bore him two daughters, whom he sent hither with plenty of money. One he married to a man whom I will not name—for I do not care to incur the enmity of many persons,—the other, in contempt of the laws of the city, In 451/0 Pericles carried a measure which excluded from citizenship all who could not show pure Athenian blood through both parents. By the close of the Peloponnesian war this restriction had fallen into neglect, and in 403 the restored democracy passed an enactment excluding from citizenship children born of a foreign mother after that date. If Demosthenes' mother was born of a Thracian mother and after 403 (neither fact is certain), she could not bear legitimate children to her Athenian husband.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0026/tlg003/tlg0026.tlg003.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (25 passages, 8 pages from original 68 pages)", "matched_keywords": "athenian, athenians, bar, blood, born, children, citizens, citizenship, daughter, enactment, exclude, excluded, foreigner, foreigners, husband, illegitimate, law, laws, legitimate, man, mother, restrict, restricted, senate, wife", "extraction_cost_usd": "0.196545", "prompt_tokens": "7928", "completion_tokens": "1035", "in_group_std": "Nobles", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Citizenship"}, {"work_name": "Against Ctesiphon", "author": "Aeschines", "impact_year": "-354", "polity": "Second Athenian League", "criterion_category": "MORAL_CONDUCT", "criterion_label": "Disfranchisement for receiving bribes", "in_group": "Citizens who do not receive bribes", "out_group": "Those convicted of receiving bribes", "resource": "Franchise (voting rights and civic participation)", "speaker": "Aeschines", "verbatim": "And—strangest of all—in the same court-rooms do you disfranchise those who are convicted of receiving bribes, and then yourselves propose to crown a man who, to your own knowledge, has always been in politics for pay?", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0026/tlg003/tlg0026.tlg003.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (25 passages, 8 pages from original 68 pages)", "matched_keywords": "court, franchise, man, shame, stranger, strangers", "extraction_cost_usd": "0.196545", "prompt_tokens": "7928", "completion_tokens": "1035", "in_group_std": "Morally upright", "out_group_std": "Morally condemned", "resource_std": "Political participation"}, {"work_name": "The Second Tetralogy: Prosecution for Accidental Homicide", "author": "Antiphon", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "AGE", "criterion_label": "Adults vs children in legal proceedings", "in_group": "Adults", "out_group": "Children/minors", "resource": "Legal standing to appear in court and defend oneself", "speaker": "defendant", "verbatim": "I myself, who, unless I am sorely mistaken, am very far from finding or wanting to find such a task congenial, have today been forced by sheer misfortune to depart from my habits and appear as defendant in a case in which I found it hard enough to arrive at the exact truth, but which leaves me still more perplexed when I consider how I should present it to you. I am driven by pitiless necessity: and I, like my opponents, gentlemen of the jury, seek refuge in your sympathy.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0028/tlg003/tlg0028.tlg003.perseus-eng2.txt", "extraction_method": "FULL_TEXT (24,117 chars ≈ 10 pages)", "matched_keywords": "fortune, resident, slaves", "extraction_cost_usd": "0.15066", "prompt_tokens": "8909", "completion_tokens": "227", "in_group_std": "Adults", "out_group_std": "Young/Minors", "resource_std": "Legal standing"}, {"work_name": "Against Alcibiades", "author": "Andocides", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "CITIZENSHIP", "criterion_label": "Voting rights in ostracism reserved for citizens", "in_group": "Citizens", "out_group": "Non-citizens", "resource": "Voting rights in political decisions (ostracism)", "speaker": "Andocides", "verbatim": "Moreover, at a time like this those who have political associates and confederates have an advantage over the rest, because the judges are not appointed by lot as in courts of law: in the present decision every member of the community has a voice.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0027/tlg004/tlg0027.tlg004.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (11 passages, 8 pages from original 12 pages)", "matched_keywords": "court, govern, judge, law, laws, priest, resident, vice", "extraction_cost_usd": "0.173685", "prompt_tokens": "7859", "completion_tokens": "744", "in_group_std": "Citizens", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Political participation"}, {"work_name": "Against Alcibiades", "author": "Andocides", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Free persons cannot be imprisoned without legal process", "in_group": "Free persons", "out_group": "Slaves", "resource": "Freedom from arbitrary imprisonment", "speaker": "Andocides", "verbatim": "In our treaties with other states we make it a condition that no free man shall be imprisoned or placed in durance, and a heavy fine is prescribed as the penalty for so doing. Yet when Alcibiades behaved as he did, no one sought satisfaction, whether for himself or for the state.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0027/tlg004/tlg0027.tlg004.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (11 passages, 8 pages from original 12 pages)", "matched_keywords": "estate, free, freed, man, mother, statute", "extraction_cost_usd": "0.173685", "prompt_tokens": "7859", "completion_tokens": "744", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Freedom"}, {"work_name": "Against Alcibiades", "author": "Andocides", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "CITIZENSHIP", "criterion_label": "Only citizens can compete in choruses", "in_group": "Citizens", "out_group": "Non-citizens", "resource": "Right to participate in public competitions", "speaker": "Andocides", "verbatim": "The law allows the ejection of any member whatsoever of a competing chorus who is not of Athenian birth, and it is forbidden to resist any attempt at such ejection.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0027/tlg004/tlg0027.tlg004.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (11 passages, 8 pages from original 12 pages)", "matched_keywords": "allow, allowed, athenian, athenians, birth, forbid, forbidden, law, laws", "extraction_cost_usd": "0.173685", "prompt_tokens": "7859", "completion_tokens": "744", "in_group_std": "Citizens", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Cultural participation"}, {"work_name": "Against Alcibiades", "author": "Andocides", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Enslavement transforms free citizens into property", "in_group": "Free persons", "out_group": "Slaves", "resource": "Personal freedom and citizenship rights", "speaker": "Andocides", "verbatim": "That is why the young spend their days in the courts instead of in the gymnasia; that is why our old men fight our battles, while our young men make speeches— they take Alcibiades as their model, Alcibiades who carries his villainy to such unheard-of lengths that, after recommending that the people of Melos be sold into slavery, he purchased a woman from among the prisoners and has since had a son by her, a child whose birth was more unnatural than that of Aegisthus, since he is sprung from parents who are each other's deadliest enemies, and of his nearest kin the one has committed and the other has suffered the most terrible of wrongs. Indeed it would be well to make such shamelessness still plainer. He got himself a child by the very woman whom he had turned from a free citizen into a slave, whose father and kinsfolk he had put to death and whose city he had made a waste.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0027/tlg004/tlg0027.tlg004.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (11 passages, 8 pages from original 12 pages)", "matched_keywords": "birth, child, citizen, citizens, court, father, free, freed, heir, maiden, men, mother, old, right, slave, slavery, slaves, son, woman, women, young, younger", "extraction_cost_usd": "0.173685", "prompt_tokens": "7859", "completion_tokens": "744", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Freedom"}, {"work_name": "On the Choreutes", "author": "Antiphon", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Free men vs slaves in legal testimony procedures", "in_group": "Free men", "out_group": "Slaves", "resource": "Freedom from torture during legal testimony", "speaker": "author", "verbatim": "Let him question the free men as befitted free men; for their own sakes and in the interests of justice, they would give a faithful account of what had occurred. As to the slaves, if he considered that they were answering his questions truthfully, well and good; if he did not, I was ready to place all my own at his disposal for examination under torture", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0028/tlg006/tlg0028.tlg006.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (11 passages, 8 pages from original 14 pages)", "matched_keywords": "free, freed, heir, men, slave, slaves", "extraction_cost_usd": "0.143955", "prompt_tokens": "7567", "completion_tokens": "406", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Body integrity"}, {"work_name": "On the Choreutes", "author": "Antiphon", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "PROPERTY_WEALTH", "criterion_label": "Wealthy citizens obligated to perform public liturgies", "in_group": "Wealthy citizens", "out_group": "Less wealthy citizens", "resource": "Obligation to perform public duties (liturgies)", "speaker": "author", "verbatim": "When I was appointed Choregus for the Thargelia, The χορηγία was one of the λητουργίαι, or public duties, imposed upon the richer citizens by the state. A Choregus had to equip and train a chorus for one of the annual festivals, in this case the Thargelia, held in honor of Apollo and celebrated on the 7th of Thargelion (May 1st) by a competition between choirs of boys selected from the ten tribes, which were grouped in pairs for the purpose.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0028/tlg006/tlg0028.tlg006.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (11 passages, 8 pages from original 14 pages)", "matched_keywords": "boy, boys, citizen, citizens, citizenship, estate, herald, rich, statute", "extraction_cost_usd": "0.143955", "prompt_tokens": "7567", "completion_tokens": "406", "in_group_std": "Property owners", "out_group_std": "Poor/Non-property owners", "resource_std": "Civic obligations"}, {"work_name": "The Third Tetralogy: Prosecution for Murder Of One Who Pleads That He Was Acting in Self-Defence", "author": "Antiphon", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "AGE", "criterion_label": "Young men presumed more likely to be aggressors than old men", "in_group": "Old men", "out_group": "Young men", "resource": "Presumption of innocence in legal proceedings", "speaker": "Prosecutor", "verbatim": "To begin with, he said that even if the man did die as a result of the blows, he did not kill him: because it is the aggressor who is to blame for what happens: it is he whom the law condemns; and the aggressor was the dead man. First, let me tell you that young men are more likely to be the aggressors and make a drunken assault than old. The young are incited by their natural arrogance, their full vigor, and the unaccustomed effects of wine to give free play to anger: whereas old men are sobered by their experience of drunken excesses, by the weakness of age, and by their fear of the strength of the young.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0028/tlg004/tlg0028.tlg004.perseus-eng2.txt", "extraction_method": "FULL_TEXT (21,267 chars ≈ 9 pages)", "matched_keywords": "age, aged, free, freed, heir, law, laws, man, men, naturalized, old, young, younger", "extraction_cost_usd": "0.14052", "prompt_tokens": "8018", "completion_tokens": "270", "in_group_std": "Men", "out_group_std": "Young/Minors", "resource_std": "Legal standing"}, {"work_name": "On the Therapeutics of Acute Diseases", "author": "Aretaeus of Cappadocia", "impact_year": "135", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "AGE", "criterion_label": "Children vs adults in medical treatment approaches", "in_group": "Adults", "out_group": "Children", "resource": "Different medical treatments and procedures", "speaker": "author", "verbatim": "In children, then, to whom, owing to dyspepsia, or from excessive cold, the disease is familiar, vomiting, either of food, or of phlegm, or of any other humour, is beneficial. Feathers, then, dipped in the ointment of iris, excite vomiting; and the unguentum irinum is not inapplicable for smearing the tonsils with. But having first laid the child on his belly (this is the easiest position for vomiting), we must press gently on his lower belly.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0719/tlg003/tlg0719.tlg003.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (27 passages, 8 pages from original 56 pages)", "matched_keywords": "child, children, father, mother, old, owner, power, prostitution, voting", "extraction_cost_usd": "0.153015", "prompt_tokens": "8146", "completion_tokens": "411", "in_group_std": "Adults", "out_group_std": "Young/Minors", "resource_std": "EXCLUDE_MEDICAL"}, {"work_name": "On the Therapeutics of Acute Diseases", "author": "Aretaeus of Cappadocia", "impact_year": "135", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "GENDER", "criterion_label": "Women requiring different medical treatment for suffocation", "in_group": "Men", "out_group": "Women", "resource": "Standard medical treatment procedures", "speaker": "author", "verbatim": "Should the patient partially recover, she is to be seated in a decoction of aromatics, and fumigated from below with fragrant perfumes. Also before a meal, she is to drink of castor, and a little quantity of the hiera with the castor. And if relieved, she is to bathe, and at the proper season is to return to her accustomed habits; and we must look to the woman that her menstrual discharges flow freely.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0719/tlg003/tlg0719.tlg003.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (27 passages, 8 pages from original 56 pages)", "matched_keywords": "free, property, senate, woman, women", "extraction_cost_usd": "0.153015", "prompt_tokens": "8146", "completion_tokens": "411", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "EXCLUDE_MEDICAL"}, {"work_name": "On the Causes and Symptoms of Acute Diseases", "author": "Aretaeus of Cappadocia", "impact_year": "135", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "AGE", "criterion_label": "Children less liable to fatal pleurisy than adults", "in_group": "Children", "out_group": "Adults and elderly", "resource": "Better survival rates from pleurisy", "speaker": "author", "verbatim": "Children are least of all liable to pleurisy, and in their case it is less frequently fatal; for their bodies are rare, secretions copious, perspiration and exhalation abundant; hence neither is a great inflammation formed. This is the felicity of their period of life in the present affection.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0719/tlg001/tlg0719.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (24 passages, 8 pages from original 32 pages)", "matched_keywords": "children, heir, resident", "extraction_cost_usd": "0.181665", "prompt_tokens": "7906", "completion_tokens": "841", "in_group_std": "Minors", "out_group_std": "Elders", "resource_std": "EXCLUDE_MEDICAL"}, {"work_name": "On the Causes and Symptoms of Acute Diseases", "author": "Aretaeus of Cappadocia", "impact_year": "135", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "AGE", "criterion_label": "Children more readily escape from intestinal inflammation", "in_group": "Children", "out_group": "Old persons", "resource": "Better recovery from intestinal diseases", "speaker": "author", "verbatim": "This affection is customary with children, who are subject to indigestion, and they more readily escape from the mischief, owing to their habits and the humidity of their intestines, for they are loose. Old persons do not readily suffer from the complaint, but rarely recover.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0719/tlg001/tlg0719.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (24 passages, 8 pages from original 32 pages)", "matched_keywords": "children, heir, old", "extraction_cost_usd": "0.181665", "prompt_tokens": "7906", "completion_tokens": "841", "in_group_std": "Minors", "out_group_std": "Elders", "resource_std": "EXCLUDE_MEDICAL"}, {"work_name": "On the Causes and Symptoms of Acute Diseases", "author": "Aretaeus of Cappadocia", "impact_year": "135", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "AGE", "criterion_label": "Infants most free from danger of liver diseases", "in_group": "Infants", "out_group": "Adults and elderly", "resource": "Protection from fatal liver diseases", "speaker": "author", "verbatim": "Winter and autumn bring on these diseases. As to age, manhood, but still more old age. The other seasons and periods of life do not generally produce the diseases, and they very rarely prove fatal. Of all others, infants are most free from danger.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0719/tlg001/tlg0719.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (24 passages, 8 pages from original 32 pages)", "matched_keywords": "age, aged, free, freed, mother, old", "extraction_cost_usd": "0.181665", "prompt_tokens": "7906", "completion_tokens": "841", "in_group_std": "Minors", "out_group_std": "Elders", "resource_std": "EXCLUDE_MEDICAL"}, {"work_name": "On the Causes and Symptoms of Acute Diseases", "author": "Aretaeus of Cappadocia", "impact_year": "135", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "GENDER", "criterion_label": "Only women suffer from hysterical suffocation", "in_group": "Men", "out_group": "Women", "resource": "Freedom from uterine diseases", "speaker": "author", "verbatim": "For this reason the affection occurs in young women, but not in old. For in those in whom the age, mode of life, and understanding is more mobile, the uterus also is of a wandering nature; but in those more advanced in life, the age, mode of living, understanding, and the uterus are of a steady character. Wherefore this suffocation from the womb accompanies females alone.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0719/tlg001/tlg0719.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (24 passages, 8 pages from original 32 pages)", "matched_keywords": "age, aged, female, mature, naturalized, old, woman, women, young, younger", "extraction_cost_usd": "0.181665", "prompt_tokens": "7906", "completion_tokens": "841", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "EXCLUDE_MEDICAL"}, {"work_name": "On the Causes and Symptoms of Acute Diseases", "author": "Aretaeus of Cappadocia", "impact_year": "135", "polity": "Roman Empire;(Roman Empire)", "criterion_category": "GENDER", "criterion_label": "Men not subject to suffocation from the womb", "in_group": "Men", "out_group": "Women", "resource": "Freedom from uterine suffocation", "speaker": "author", "verbatim": "I believe, indeed, that lust is engendered in women of a humid temperament, so as to induce a copious discharge of the superfluous humours; but I do not at all believe that they are affected with Satyriasis, for their nature, being cold, is not adapted to it. But neither, also, has woman the parts necessary for erection, like those of a Satyr, whence the affection derives its name; and neither also are men subject to suffocation from the womb, because men have not an uterus.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0719/tlg001/tlg0719.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (24 passages, 8 pages from original 32 pages)", "matched_keywords": "deprive, deprived, heir, mature, men, naturalized, old, woman, women", "extraction_cost_usd": "0.181665", "prompt_tokens": "7906", "completion_tokens": "841", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "EXCLUDE_MEDICAL"}, {"work_name": "Eudemian Ethics", "author": "Aristotle", "impact_year": "-348", "polity": "Thebans", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Slaves excluded from partnership relationships with masters", "in_group": "Free persons/Masters", "out_group": "Slaves", "resource": "Right to form equal partnerships and share in goods", "speaker": "author", "verbatim": "But since the relations of soul and body, craftsman and tool, and master and slave are similar, between the two terms of each of these pairs there is no partnership; for they are not two, but the former is one and the latter a part of that one, not one itself; nor is the good divisible between them, but that of both belongs to the one for whose sake they exist. For the body is the soul's tool born with it, a slave is as it were a member or tool of his master, a tool is a sort of inanimate slave.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0086/tlg009/tlg0086.tlg009.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (28 passages, 8 pages from original 97 pages)", "matched_keywords": "born, boy, craftsman, farmer, master, masters, slave, slavery, slaves", "extraction_cost_usd": "0.157905", "prompt_tokens": "7817", "completion_tokens": "542", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Property/Wealth"}, {"work_name": "Eudemian Ethics", "author": "Aristotle", "impact_year": "-348", "polity": "Thebans", "criterion_category": "CITIZENSHIP", "criterion_label": "Citizens have civic friendship rights that non-citizens lack", "in_group": "Citizens", "out_group": "Non-citizens", "resource": "Right to civic partnerships and mutual utility relationships", "speaker": "author", "verbatim": "Civic friendship is, it is true, based on utility, and fellow-citizens are one another's friends in the same way as different cities are, and 'Athens no longer knoweth Megara,' nor similarly do citizens know one another, when they are not useful to one another; their friendship is a ready-money transaction.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0086/tlg009/tlg0086.tlg009.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (28 passages, 8 pages from original 97 pages)", "matched_keywords": "athenians, citizen, citizens, citizenship, heir, shame", "extraction_cost_usd": "0.157905", "prompt_tokens": "7817", "completion_tokens": "542", "in_group_std": "Citizens", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Legal standing"}, {"work_name": "Eudemian Ethics", "author": "Aristotle", "impact_year": "-348", "polity": "Thebans", "criterion_category": "MORAL_CONDUCT", "criterion_label": "Good men exempt from legal actions in voluntary contracts", "in_group": "Good men/Those of good moral conduct", "out_group": "Those not considered good men", "resource": "Legal immunity in voluntary contract disputes", "speaker": "author", "verbatim": "Hence in some places there is a law prohibiting friendly associates of this sort from actions as to their voluntary contracts—rightly, since it is not natural for good men to go to law, and these men make their contracts as good men and as dealing with trustworthy people.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0086/tlg009/tlg0086.tlg009.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (28 passages, 8 pages from original 97 pages)", "matched_keywords": "heir, law, laws, men, naturalized, prohibit, prohibited, right, rights", "extraction_cost_usd": "0.157905", "prompt_tokens": "7817", "completion_tokens": "542", "in_group_std": "Men", "out_group_std": "Morally condemned", "resource_std": "Legal standing"}, {"work_name": "On the Mysteries", "author": "Andocides", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Slaves cannot testify about religious mysteries without immunity", "in_group": "Free persons", "out_group": "Slaves", "resource": "Right to testify in legal proceedings without special permission", "speaker": "author", "verbatim": "Grant immunity to him whom I indicate, and a non-initiate, a slave belonging to someone here present, shall describe the Mysteries to you. You can punish me as you will, if that is not the truth.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0027/tlg001/tlg0027.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (20 passages, 8 pages from original 43 pages)", "matched_keywords": "resident, scribe, slave, slavery, slaves", "extraction_cost_usd": "0.19395", "prompt_tokens": "7920", "completion_tokens": "1002", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Legal standing"}, {"work_name": "On the Mysteries", "author": "Andocides", "impact_year": "-500", "polity": "Greek City-States", "criterion_category": "MORAL_CONDUCT", "criterion_label": "Those convicted of certain crimes lose personal rights", "in_group": "Citizens of good conduct", "out_group": "Those convicted of theft, bribery, cowardice, desertion, or maltreating parents", "resource": "Personal civic rights while retaining property", "speaker": "author", "verbatim": "According to a second, delinquents lost all personal rights, but retained possession of their property. This class included all persons convicted of theft or of accepting bribes—it was laid down that both they and their descendants should lose their personal rights. Similarly, all who deserted on the field of battle, who were found guilty of evasion of military service, of cowardice, or of withholding a ship from action, all who threw away their shields, or were thrice convicted of giving perjured evidence or of falsely endorsing a summons, or who were found guilty of maltreating their parents, were deprived of their personal rights, while retaining possession of their property.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0027/tlg001/tlg0027.tlg001.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (20 passages, 8 pages from original 43 pages)", "matched_keywords": "coward, cowardice, deprive, deprived, deserter, desertion, heir, military, possess, possession, poverty, profession, property, right, rights, servile", "extraction_cost_usd": "0.19395", "p sthenes", "impact_year": "-348", "polity": "Second Athenian League", "criterion_category": "PROPERTY_WEALTH", "criterion_label": "Property ownership required for certain civic duties and honors", "in_group": "Citizens with sufficient property", "out_group": "Citizens without sufficient property", "resource": "Ability to provide chorus, pay for war-galley, and participate in property-tax assessments", "speaker": "Demosthenes", "verbatim": "When I had come of age, my circumstances were in accordance with my upbringing. I was in a position to provide a chorus, to pay for a war-galley, and to be assessed to property-tax. I renounced no honorable ambition either in public or in private life: and rendered good service both to the commonwealth and to my own friends.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0014/tlg018/tlg0014.tlg018.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (29 passages, 9 pages from original 72 pages)", "matched_keywords": "age, aged, poverty, property, prostitution, servile, tax", "extraction_cost_usd": "0.15192", "prompt_tokens": "8043", "completion_tokens": "417", "in_group_std": "Property owners", "out_group_std": "Poor/Non-property owners", "resource_std": "Property/Wealth"}, {"work_name": "Apollodorus Against Stephanus II", "author": "Demosthenes", "impact_year": "-348", "polity": "Second Athenian League", "criterion_category": "GENDER", "criterion_label": "Only men can be legal guardians and arrange marriages", "in_group": "Men (fathers, brothers, grandfathers)", "out_group": "Women", "resource": "Legal guardianship and authority to arrange marriages", "speaker": "author", "verbatim": "If a woman be betrothed for lawful marriage by her father or by a brother begotten of the same father or by her grandfather on her father's side, her children shall be legitimate. In case there be none of these relatives, if the woman be an heiress, her guardian shall take her ild in a different way.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0086/tlg035/tlg0086.tlg035.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 9 pages from original 243 pages)", "matched_keywords": "child, female, free, freed, heir, male, man, mature, naturalized, rule, slave, slavery, slaves", "extraction_cost_usd": "0.20895", "prompt_tokens": "7625", "completion_tokens": "1261", "in_group_std": "Men", "out_group_std": "Women", "resource_std": "Political participation"}, {"work_name": "Politics", "author": "Aristotle", "impact_year": "-348", "polity": "Thebans", "criterion_category": "FREEDOM_STATUS", "criterion_label": "Free persons rule over slaves", "in_group": "Free persons", "out_group": "Slaves", "resource": "Political authority and personal autonomy", "speaker": "author", "verbatim": "For the free rules the slave, the male the female, and the man the child in a different way. And all possess the various parts of the soul, but possess them in different ways; for the slave has not got the deliberative part at all, and the female has it, but without full authority, while the child has it, but in an undeveloped form.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0086/tlg035/tlg0086.tlg035.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 9 pages from original 243 pages)", "matched_keywords": "authority, child, female, free, freed, male, man, possess, possession, rule, slave, slavery, slaves", "extraction_cost_usd": "0.20895", "prompt_tokens": "7625", "completion_tokens": "1261", "in_group_std": "Free persons", "out_group_std": "Slaves", "resource_std": "Political participation"}, {"work_name": "Politics", "author": "Aristotle", "impact_year": "-348", "polity": "Thebans", "criterion_category": "CITIZENSHIP", "criterion_label": "Citizens have full legal rights while resident aliens require patrons", "in_group": "Citizens", "out_group": "Resident aliens", "resource": "Legal standing and right to sue", "speaker": "author", "verbatim": "o can sue and be sued at law,—or rather, in many places even the right of legal action is not shared completely by resident aliens, but they are obliged to produce a patron, so that they only share in a common legal procedure to an incomplete degree", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0086/tlg035/tlg0086.tlg035.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 9 pages from original 243 pages)", "matched_keywords": "alien, aliens, common, commoner, decree, father, law, laws, legal, man, matron, patrimony, resident, right, rights, shame", "extraction_cost_usd": "0.20895", "prompt_tokens": "7625", "completion_tokens": "1261", "in_group_std": "Citizens", "out_group_std": "Non-citizens/Foreigners", "resource_std": "Legal standing"}, {"work_name": "Politics", "author": "Aristotle", "impact_year": "-348", "polity": "Thebans", "criterion_category": "BIRTH_LINEAGE", "criterion_label": "Citizenship restricted to those with citizen parents on both sides", "in_group": "Those with citizen parents on both sides", "out_group": "Those with only one citizen parent or slave parentage", "resource": "Citizenship rights", "speaker": "author", "verbatim": "Nevertheless, inasmuch as such persons are adopted as citizens owing to a lack of citizens of legitimate birth (for legislation of this kind is resorted to because of under-population), when a state becomes well off for numbers it gradually divests itself first of the sons of a slave father or mother, then of those whose mothers only were citizens, and finally only allows citizenship to the children of citizens on both sides.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0086/tlg035/tlg0086.tlg035.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 9 pages from original 243 pages)", "matched_keywords": "allow, allowed, birth, children, citizen, citizens, citizenship, estate, father, illegitimate, legitimate, mother, slave, slavery, slaves, son, statute", "extraction_cost_usd": "0.20895", "prompt_tokens": "7625", "completion_tokens": "1261", "in_group_std": "Citizens", "out_group_std": "Slaves", "resource_std": "Citizenship"}, {"work_name": "Politics", "author": "Aristotle", "impact_year": "-348", "polity": "Thebans", "criterion_category": "PROPERTY_WEALTH", "criterion_label": "Property requirements for holding political office", "in_group": "Property owners meeting qualifications", "out_group": "Those without sufficient property", "resource": "Hold political office", "speaker": "author", "verbatim": "This therefore is one kind of democracy, where the offices are held on property qualifications, but these low ones, although it is essential that the man who acquires the specified amount should have the right to hold office, and the man who loses it should not hold office.", "file_path": "/Users/charlesdedampierre/Desktop/Rsearch Folder/human_rights/greek-pilot/perseus/data/full_text/tlg0086/tlg035/tlg0086.tlg035.perseus-eng2.txt", "extraction_method": "HYBRID_EXTRACTED (31 passages, 9 pages from original 243 pages)", "matched_keywords": "herald, man, office, old, poverty, property, right, rights", "extraction_cost_usd": "0.20895", "prompt_tokens": "7625", "completion_tokens": "1261", "in_group_std": "Property owners", "out_group_std": "Poor/Non-property owners", "resource_std": "Political participation"}, {"work_name": "Politics", "author": "Aristotle", "impact_year": "-348", "polity": "Thebans", "criterion_category": "PROPERTY_WEALTH", "criterion_label": "Wealthy required to possess arms while poor are exempt", "in_group": "The wealthy", "out_group": "The poor", "resource": "Obligation to possess arms and engage in gymnastics", "speaker": "author", "verb
