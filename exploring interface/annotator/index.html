<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Perseus rule annotator</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml"
  href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%232b6cb0'/><text x='12' y='17' font-family='Helvetica,Arial,sans-serif' font-size='14' font-weight='700' text-anchor='middle' fill='white'>π</text></svg>" />
<style>
  :root {
    --fg: #1a202c;
    --fg-muted: #4a5568;
    --fg-faint: #718096;
    --bg: #f7fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --accent: #2b6cb0;
    --up: #2f855a;
    --up-bg: #f0fff4;
    --down: #c53030;
    --down-bg: #fff5f5;
    --skip: #a0aec0;
    --past: #c05621;
    --contemporary: #2b6cb0;
    --future: #2f855a;
    --mixed: #805ad5;
    --timeless: #a0aec0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, "Segoe UI", sans-serif;
    font-size: 14px; line-height: 1.45;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  header h1 {
    margin: 0; font-size: 15px; font-weight: 700; letter-spacing: 0.02em;
  }
  header h1 span { color: var(--accent); }
  .progress {
    display: flex; align-items: center; gap: 12px;
    font-size: 12px; color: var(--fg-muted);
  }
  .progress-bar {
    width: 180px; height: 6px; background: var(--border); border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar > div {
    height: 100%; background: var(--accent); width: 0; transition: width 0.2s;
  }
  .toolbar { display: flex; gap: 6px; }
  .btn {
    font: inherit; cursor: pointer;
    border: 1px solid var(--border); background: var(--card);
    color: var(--fg); padding: 6px 10px; border-radius: 4px;
    font-size: 12px;
  }
  .btn:hover { background: #edf2f7; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: #2c5282; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--fg-muted); }
  main {
    max-width: 1200px; margin: 20px auto; padding: 0 20px;
    display: grid; grid-template-columns: 1.2fr 1fr; gap: 18px;
  }
  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 14px 16px;
  }
  .panel h2 {
    margin: 0 0 10px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-faint);
  }
  table.features {
    width: 100%; border-collapse: collapse; font-size: 12.5px;
  }
  table.features tr { border-bottom: 1px solid var(--border); }
  table.features tr:last-child { border-bottom: none; }
  table.features th, table.features td {
    text-align: left; padding: 5px 6px; vertical-align: top;
  }
  table.features th {
    color: var(--fg-muted); font-weight: 500; width: 38%;
    font-variant: small-caps; letter-spacing: 0.03em;
  }
  table.features td { color: var(--fg); }
  table.features tr.highlight { background: #ebf8ff; }
  .verbatim {
    font-size: 14px; line-height: 1.55; color: var(--fg);
    border-left: 3px solid var(--accent); padding: 8px 12px;
    background: #f0f6fc; border-radius: 0 4px 4px 0;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
    color: white; margin-right: 4px;
  }
  .pill.past { background: var(--past); }
  .pill.contemporary { background: var(--contemporary); }
  .pill.future { background: var(--future); }
  .pill.mixed { background: var(--mixed); }
  .pill.timeless { background: var(--timeless); color: #2d3748; }
  .rating {
    display: flex; gap: 10px; margin: 14px 0 10px;
  }
  .rating button {
    flex: 1; padding: 12px; font-size: 14px; font-weight: 600;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); cursor: pointer; transition: all 0.15s;
  }
  .rating button:hover { border-color: var(--fg-muted); }
  .rating button.up { color: var(--up); }
  .rating button.down { color: var(--down); }
  .rating button.skip { color: var(--fg-muted); }
  .rating button.active.up { background: var(--up-bg); border-color: var(--up); }
  .rating button.active.down { background: var(--down-bg); border-color: var(--down); }
  .rating button.active.skip { background: #edf2f7; border-color: var(--skip); }
  textarea {
    width: 100%; font: inherit; font-size: 13px; line-height: 1.45;
    border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px;
    resize: vertical; min-height: 70px; background: var(--bg);
    color: var(--fg);
  }
  textarea:focus {
    outline: none; border-color: var(--accent); background: var(--card);
  }
  .nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 14px; gap: 10px;
  }
  .nav-jump {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--fg-muted);
  }
  .nav-jump input[type="number"] {
    width: 64px; font: inherit; font-size: 13px;
    border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px;
    text-align: center;
  }
  .meta {
    font-size: 11px; color: var(--fg-faint); margin-top: 8px;
  }
  .stats {
    font-size: 11px; color: var(--fg-muted); line-height: 1.6;
  }
  .stats b { color: var(--fg); font-weight: 600; }
  kbd {
    font: inherit; font-size: 10.5px; padding: 1px 5px;
    background: #edf2f7; border: 1px solid var(--border);
    border-radius: 3px; color: var(--fg-muted);
  }
  .rule-name {
    font-size: 17px; font-weight: 700; margin: 0 0 3px; color: var(--fg);
  }
  .rule-sub { font-size: 12px; color: var(--fg-muted); margin-bottom: 14px; }
  @media (max-width: 860px) {
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <h1>Perseus rule annotator <span>·</span> <span id="title-count"></span></h1>
  <div class="progress">
    <span id="progress-text">0 / 0</span>
    <div class="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <div class="toolbar">
    <button class="btn" id="btn-stats" title="Show distribution of your ratings">Stats</button>
    <button class="btn" id="btn-clear" title="Clear all local annotations">Clear</button>
    <button class="btn btn-primary" id="btn-export">Export ⤓</button>
  </div>
</header>

<main>
  <section class="panel" id="panel-features">
    <h2>Features</h2>
    <h3 class="rule-name" id="rule-name"></h3>
    <div class="rule-sub" id="rule-sub"></div>
    <table class="features" id="features-table"></table>
    <div class="meta">
      Shortcuts: <kbd>↑</kbd> valid · <kbd>↓</kbd> invalid · <kbd>→</kbd> next · <kbd>←</kbd> prev · <kbd>s</kbd> skip
    </div>
  </section>

  <section class="panel" id="panel-annotate">
    <h2>Verbatim</h2>
    <div class="verbatim" id="verbatim"></div>

    <h2 style="margin-top: 16px;">Your annotation</h2>
    <div class="rating">
      <button class="up"   data-rating="up">👍 Valid</button>
      <button class="down" data-rating="down">👎 Invalid</button>
      <button class="skip" data-rating="skip">⤼ Skip</button>
    </div>
    <textarea id="comment" placeholder="Comment (optional): what is wrong, what should change, or why this is correct."></textarea>
    <div class="nav">
      <button class="btn" id="btn-prev">← Prev</button>
      <div class="nav-jump">
        <span>Go to</span>
        <input type="number" id="jump" min="1" />
        <span id="nav-total"></span>
      </div>
      <button class="btn btn-primary" id="btn-next">Next →</button>
    </div>
    <div class="stats" id="stats"></div>
  </section>
</main>

<script src="data.js"></script>
<script>
(function () {
  const STORAGE_KEY = "perseus_annotations_v1";
  const sample = window.SAMPLE;
  if (!sample || !Array.isArray(sample.rules)) {
    document.body.innerHTML = "<p style='padding:2em'>No <code>data.js</code> found. Run <code>python scripts/sample_building/build_annotation_sample.py</code>.</p>";
    return;
  }
  const rules = sample.rules;
  let current = 0;
  let annotations = loadAnnotations();

  // Columns shown in the features table (order = display order)
  const FEATURE_COLS = [
    "criteria", "rule", "group", "resource", "directionality",
    "rule_polity", "rule_polity_reasoning",
    "rule_time_reference", "rule_time_reasoning",
    "confidence", "reasoning",
    "contemporary", "factuality", "is_historical",
    "group_specificity", "group_immutability",
    "resource_materiality", "resource_generality", "resource_persistence",
    "tautological",
    "author", "impact_year", "cliopatria_polity", "occupations",
    "work_title", "genre", "period", "main_language", "pub_date",
    "file_id", "rule_uid",
  ];
  const HIGHLIGHT = new Set([
    "rule_polity", "rule_polity_reasoning",
    "rule_time_reference", "rule_time_reasoning",
  ]);
  const LABELS = {
    rule_polity: "rule polity",
    rule_polity_reasoning: "polity reasoning",
    rule_time_reference: "rule time",
    rule_time_reasoning: "time reasoning",
    cliopatria_polity: "author polity",
    impact_year: "author floruit",
    group_specificity: "group specificity",
    group_immutability: "group immutability",
    resource_materiality: "resource materiality",
    resource_generality: "resource generality",
    resource_persistence: "resource persistence",
    main_language: "language",
    work_title: "work",
  };

  function loadAnnotations() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    } catch (e) { return {}; }
  }
  function saveAnnotations() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(annotations));
  }
  function countBy(kind) {
    return Object.values(annotations).filter(a => a.rating === kind).length;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
    ));
  }
  function labelFor(k) {
    return LABELS[k] || k.replace(/_/g, " ");
  }
  function pillFor(timeRef) {
    return `<span class="pill ${timeRef}">${timeRef}</span>`;
  }

  function render() {
    const r = rules[current];
    document.getElementById("rule-name").textContent = r.rule || r.rule_uid;
    const sub = [r.criteria, r.group && "· " + r.group, r.author && "· " + r.author]
      .filter(Boolean).join(" ");
    document.getElementById("rule-sub").innerHTML =
      `${escapeHtml(sub)} ${r.rule_time_reference ? pillFor(r.rule_time_reference) : ""}`;

    document.getElementById("verbatim").textContent = r.verbatim || "(no verbatim provided)";

    const tbl = document.getElementById("features-table");
    tbl.innerHTML = FEATURE_COLS
      .filter(k => r[k] !== undefined && r[k] !== null && r[k] !== "")
      .map(k => {
        const cls = HIGHLIGHT.has(k) ? " class='highlight'" : "";
        const val = k === "rule_time_reference"
          ? pillFor(r[k])
          : escapeHtml(r[k]);
        return `<tr${cls}><th>${escapeHtml(labelFor(k))}</th><td>${val}</td></tr>`;
      }).join("");

    const ann = annotations[r.rule_uid] || {};
    document.querySelectorAll(".rating button").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.rating === ann.rating);
    });
    document.getElementById("comment").value = ann.comment || "";

    const progress = Object.keys(annotations).length;
    document.getElementById("progress-text").textContent =
      `${progress} / ${rules.length}`;
    document.getElementById("progress-fill").style.width =
      (100 * progress / rules.length) + "%";
    document.getElementById("nav-total").textContent = `of ${rules.length}`;
    document.getElementById("jump").value = current + 1;
    document.getElementById("jump").max = rules.length;
    document.getElementById("title-count").textContent =
      `${current + 1} / ${rules.length}`;

    document.getElementById("stats").innerHTML =
      `<b>${countBy("up")}</b> 👍 · <b>${countBy("down")}</b> 👎 · `
      + `<b>${countBy("skip")}</b> skipped · `
      + `<b>${rules.length - progress}</b> unrated`;
  }

  function setRating(kind) {
    const uid = rules[current].rule_uid;
    const existing = annotations[uid] || {};
    annotations[uid] = {
      rating: kind,
      comment: document.getElementById("comment").value.trim(),
      rule_uid: uid,
      file_id: rules[current].file_id,
      author: rules[current].author,
      rule_time_reference: rules[current].rule_time_reference,
      rule_polity: rules[current].rule_polity,
      annotated_at: new Date().toISOString(),
    };
    saveAnnotations();
    render();
  }

  function saveComment() {
    const uid = rules[current].rule_uid;
    const comment = document.getElementById("comment").value.trim();
    const existing = annotations[uid];
    if (existing) {
      existing.comment = comment;
      saveAnnotations();
    } else if (comment) {
      // a comment without rating still counts as an annotation
      annotations[uid] = {
        rating: "skip",
        comment,
        rule_uid: uid,
        file_id: rules[current].file_id,
        author: rules[current].author,
        rule_time_reference: rules[current].rule_time_reference,
        rule_polity: rules[current].rule_polity,
        annotated_at: new Date().toISOString(),
      };
      saveAnnotations();
      render();
    }
  }

  function go(delta) {
    current = Math.max(0, Math.min(rules.length - 1, current + delta));
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function exportJson() {
    const rows = rules.map(r => ({
      rule_uid: r.rule_uid,
      file_id: r.file_id,
      author: r.author,
      criteria: r.criteria,
      rule: r.rule,
      rule_time_reference: r.rule_time_reference,
      rule_polity: r.rule_polity,
      ...(annotations[r.rule_uid] || { rating: null, comment: "" }),
    }));
    const payload = {
      exported_at: new Date().toISOString(),
      total_sample: rules.length,
      n_rated: Object.keys(annotations).length,
      up: countBy("up"),
      down: countBy("down"),
      skip: countBy("skip"),
      annotations: rows,
    };
    download(`annotations_${stamp()}.json`,
      JSON.stringify(payload, null, 2), "application/json");

    // Also export a CSV for convenience
    const csvCols = [
      "rule_uid","file_id","author","criteria","rule",
      "rule_time_reference","rule_polity","rating","comment","annotated_at",
    ];
    const csv = [csvCols.join(",")].concat(
      rows.map(r => csvCols.map(c => csvField(r[c])).join(","))
    ).join("\n");
    download(`annotations_${stamp()}.csv`, csv, "text/csv");
  }
  function csvField(v) {
    if (v === null || v === undefined) return "";
    const s = String(v).replace(/"/g, '""');
    return /[",\n]/.test(s) ? `"${s}"` : s;
  }
  function stamp() {
    return new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
  }
  function download(name, content, mime) {
    const blob = new Blob([content], { type: mime });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
  }

  function showStats() {
    const up = countBy("up"), down = countBy("down"), skip = countBy("skip");
    const total = up + down + skip;
    // Per-time-reference breakdown
    const byTime = {};
    rules.forEach(r => {
      const t = r.rule_time_reference || "(none)";
      byTime[t] = byTime[t] || { total: 0, up: 0, down: 0, skip: 0 };
      byTime[t].total++;
      const a = annotations[r.rule_uid];
      if (a) byTime[t][a.rating] = (byTime[t][a.rating] || 0) + 1;
    });
    const rows = Object.entries(byTime).map(([t, v]) =>
      `  ${t.padEnd(14)}  sample n=${String(v.total).padStart(3)}  `
      + `👍 ${v.up||0}  👎 ${v.down||0}  skip ${v.skip||0}`
    ).join("\n");
    alert(
      `Annotations: ${total} / ${rules.length}\n`
      + `👍 valid  : ${up}\n`
      + `👎 invalid: ${down}\n`
      + `skip     : ${skip}\n\n`
      + `By time reference:\n${rows}`
    );
  }

  // Wire up UI
  document.querySelectorAll(".rating button").forEach(btn => {
    btn.addEventListener("click", () => setRating(btn.dataset.rating));
  });
  document.getElementById("comment").addEventListener("blur", saveComment);
  document.getElementById("btn-prev").addEventListener("click", () => go(-1));
  document.getElementById("btn-next").addEventListener("click", () => go(1));
  document.getElementById("btn-export").addEventListener("click", exportJson);
  document.getElementById("btn-stats").addEventListener("click", showStats);
  document.getElementById("btn-clear").addEventListener("click", () => {
    if (confirm("Delete all local annotations?")) {
      annotations = {};
      saveAnnotations();
      render();
    }
  });
  document.getElementById("jump").addEventListener("change", (e) => {
    const n = parseInt(e.target.value, 10);
    if (!isNaN(n) && n >= 1 && n <= rules.length) { current = n - 1; render(); }
  });
  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
    if (e.key === "ArrowUp")    { e.preventDefault(); setRating("up"); }
    if (e.key === "ArrowDown")  { e.preventDefault(); setRating("down"); }
    if (e.key === "ArrowRight") { e.preventDefault(); go(1); }
    if (e.key === "ArrowLeft")  { e.preventDefault(); go(-1); }
    if (e.key.toLowerCase() === "s") { e.preventDefault(); setRating("skip"); }
  });

  render();
})();
</script>
</body>
</html>
