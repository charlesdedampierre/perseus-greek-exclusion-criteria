<style>

  * { box-sizing: border-box; }

  header .counters { color: var(--muted); font-size: 13px; }
  .card { max-width: 900px; margin: 0 auto 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; }
  .meta { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .title { font-size: 17px; font-weight: 600; margin: 0 0 2px; }
  .author { color: var(--muted); margin-bottom: 16px; }
  .fields { display: grid; grid-template-columns: 130px 1fr; gap: 6px 16px; margin: 12px 0; font-size: 14px; }
  .fields dt { color: var(--muted); font-weight: 500; }
  .fields dd { margin: 0; }
  .reasoning { color: #444; font-size: 13px; font-style: italic; margin-top: 3px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: #ecebe4; color: #333; padding: 2px 10px; border-radius: 12px; font-size: 13px; }
  .buttons { display: flex; gap: 8px; margin-top: 16px; }
  button { border: 1px solid var(--border); background: #fff; padding: 6px 14px; font-size: 14px; border-radius: 6px; cursor: pointer; font-family: inherit; }
  button:hover { background: #f2f0e8; }
  button.ok.selected { background: var(--good); color: #fff; border-color: var(--good); }
  button.bad.selected { background: var(--bad); color: #fff; border-color: var(--bad); }
  textarea { width: 100%; margin-top: 10px; padding: 8px; font-family: inherit; font-size: 13px; border: 1px solid var(--border); border-radius: 6px; min-height: 44px; resize: vertical; }
  .footer { max-width: 900px; margin: 24px auto 0; display: flex; gap: 12px; }
  .footer button { padding: 10px 18px; font-weight: 500; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; background: #ecebe4; color: #333; }
  .pill.past { background: #fde68a; }
  .pill.contemporary { background: #bbf7d0; }
  .pill.mixed { background: #c7d2fe; }
  .range { font-variant-numeric: tabular-nums; }

id": "tlg0551.tlg004.perseus-eng2", "perseus_author": "Appian of Alexandria", "perseus_title": "The Roman History: The Samnite History", "genre": "", "form_of_creative_work": "", "mentioned_polities_in_work": "Early Roman Republic; Samnite League", "mentioned_polity_reasoning": "Focuses on the Samnite Wars, the major conflict for control of central Italy.", "mentioned_time_reference": "past", "mentioned_time_start_in_work": "-343", "mentioned_time_end_in_work": "-290", "mentioned_time_reasoning": "Covers the three Samnite Wars spanning from -343 to the final Roman victory around -290."}, {"file_id": "tlg0032.tlg007.perseus-eng2", "perseus_author": "Xenophon", "perseus_title": "Cyropaedia", "genre": "historical fiction, biographical novel", "form_of_creative_work": "novel, prose", "mentioned_polities_in_work": "Achaemenid Empire (Cyrus the Great)", "mentioned_polity_reasoning": "A fictionalized biography of Cyrus the Great, the founder of the Persian Empire.", "mentioned_time_reference": "past", "mentioned_time_start_in_work": "-559", "mentioned_time_end_in_work": "-530", "mentioned_time_reasoning": "Documents the life and reign of Cyrus the Great in the 6th century BCE."}, {"file_id": "tlg0526.tlg004.perseus-eng2", "perseus_author": "Flavius Josephus", "perseus_title": "The Wars of the Jews", "genre": "historiography", "form_of_creative_work": "", "mentioned_polities_in_work": "Judea; Roman Empire (Flavian)", "mentioned_polity_reasoning": "Documents the Jewish revolt against Rome and the subsequent destruction of the Temple.", "mentioned_time_reference": "contemporary", "mentioned_time_start_in_work": "66", "mentioned_time_end_in_work": "74", "mentioned_time_reasoning": "Focuses on the active conflict between the Jews and Romans from 66 CE to the fall of Masada in 74 CE."}, {"file_id": "tlg0016.tlg001.perseus-eng2", "perseus_author": "Herodotus", "perseus_title": "The Histories", "genre": "historiography, travel book", "form_of_creative_work": "", "mentioned_polities_in_work": "Achaemenid Empire; Classical Greek poleis; Lydia; Pharaonic Egypt", "mentioned_polity_reasoning": "Herodotus documents the rise of Persia and its conflict with the Greek world, including extensive ethnographic surveys of Egypt and Lydia.", "mentioned_time_reference": "past", "mentioned_time_start_in_work": "-560", "mentioned_time_end_in_work": "-479", "mentioned_time_reasoning": "Narrative begins with the rise of Croesus (-560) and concludes with the end of the Persian Wars (-479)."}, {"file_id": "tlg0099.tlg001.perseus-eng3", "perseus_author": "Strabo", "perseus_title": "Geography (Books 6-14)", "genre": "treatise", "form_of_creative_work": "", "mentioned_polities_in_work": "Roman Empire; Hellenistic Mediterranean; Italy; Greece; Asia Minor", "mentioned_polity_reasoning": "Books 6-14 cover Italy, Sicily, Northern and Eastern Europe, Greece, and Asia Minor under Roman hegemony.", "mentioned_time_reference": "contemporary", "mentioned_time_start_in_work": "-200", "mentioned_time_end_in_work": "23", "mentioned_time_reasoning": "While describing the Augustan/Tiberian world (ending c. 23 CE), Strabo includes historical context back to the 2nd century BCE."}, {"file_id": "tlg0032.tlg012.perseus-eng2", "perseus_author": "Xenophon", "perseus_title": "On the Cavalry Commander", "genre": "historiography", "form_of_creative_work": "prose", "mentioned_polities_in_work": "Classical Athens", "mentioned_polity_reasoning": "A technical manual for the Athenian cavalry commander (hipparch) in the 4th century BCE.", "mentioned_time_reference": "contemporary", "mentioned_time_start_in_work": "-365", "mentioned_time_end_in_work": "-365", "mentioned_time_reasoning": "Written as a contemporary guide for military duties in the mid-4th century BCE (approx. 365 BCE)."}, {"file_id": "tlg0007.tlg056.perseus-eng2", "perseus_author": "Plutarch", "perseus_title": "Comparison of Demosthenes with Cicero", "genre": "", "form_of_creative_work": "", "mentioned_polities_in_work": "Classic const state = {};
DATA.forEach(r => { state[r.file_id] = { verdict: null, note: "" }; });

function render() {
  const root = document.getElementById("cards");
  root.innerHTML = "";
  DATA.forEach((r, i) => {
    const s = state[r.file_id];
    const polities = (r.mentioned_polities_in_work || "").split(/;\s*/).filter(Boolean);
    const chips = polities.map(p => `<span class="chip">${escape(p)}</span>`).join("");
    const range = `${escape(r.mentioned_time_start_in_work)} → ${escape(r.mentioned_time_end_in_work)}`;
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="meta">${i+1} / ${DATA.length} · ${r.file_id}</div>
      <h2 class="title">${escape(r.perseus_title || "(untitled)")}</h2>
      <div class="author">${escape(r.perseus_author || "")} ${r.genre ? "· " + escape(r.genre) : ""}</div>
      <dl class="fields">
        <dt>Polities</dt><dd><div class="chips">${chips}</div><div class="reasoning">${escape(r.mentioned_polity_reasoning)}</div></dd>
        <dt>Time ref</dt><dd><span class="pill ${r.mentioned_time_reference}">${escape(r.mentioned_time_reference)}</span></dd>
        <dt>Year range</dt><dd><strong class="range">${range}</strong><div class="reasoning">${escape(r.mentioned_time_reasoning)}</div></dd>
      </dl>
      <div class="buttons">
        <button class="ok ${s.verdict === "ok" ? "selected" : ""}" data-id="${r.file_id}" data-v="ok">Looks right</button>
        <button class="bad ${s.verdict === "bad" ? "selected" : ""}" data-id="${r.file_id}" data-v="bad">Wrong / off</button>
      </div>
      <textarea placeholder="Optional note (what's wrong, corrected value)…" data-id="${r.file_id}">${escape(s.note)}</textarea>
    `;
    root.appendChild(div);
  });
  updateCounters();
}

function updateCounters() {
  const ok = Object.values(state).filter(s => s.verdict === "ok").length;
  const bad = Object.values(state).filter(s => s.verdict === "bad").length;
  document.getElementById("counters").textContent = `${ok} ok · ${bad} wrong · ${DATA.length - ok - bad} pending`;
}

function escape(s) {
  return (s == null ? "" : String(s)).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

document.addEventListener("click", e => {
  const b = e.target.closest("button[data-v]");
  if (!b) return;
  const id = b.dataset.id;
  state[id].verdict = state[id].verdict === b.dataset.v ? null : b.dataset.v;
  render();
});
document.addEventListener("input", e => {
  if (e.target.tagName === "TEXTAREA" && e.target.dataset.id) {
    state[e.target.dataset.id].note = e.target.value;
  }
});

document.getElementById("download").addEventListener("click", () => {
  const rows = DATA.map(r => ({
    file_id: r.file_id,
    perseus_author: r.perseus_author,
    perseus_title: r.perseus_title,
    mentioned_polities_in_work: r.mentioned_polities_in_work,
    mentioned_time_reference: r.mentioned_time_reference,
    mentioned_time_start_in_work: r.mentioned_time_start_in_work,
    mentioned_time_end_in_work: r.mentioned_time_end_in_work,
    verdict: state[r.file_id].verdict,
    note: state[r.file_id].note,
  }));
  const blob = new Blob([JSON.stringify(rows, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "works_polity_time_v2_check_20.json"; a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("summary").addEventListener("click", () => {
  const ok = Object.values(state).filter(s => s.verdict === "ok").length;
  const bad = Object.values(state).filter(s => s.verdict === "bad").length;
  const pending = DATA.length - ok - bad;
  alert(`✓ ${ok} looks right\n✗ ${bad} wrong\n· ${pending} pending\n\nAccuracy on answered: ${ok + bad ? Math.round(100 * ok / (ok + bad)) + "%" : "—"}`);
});

render();
</script>
